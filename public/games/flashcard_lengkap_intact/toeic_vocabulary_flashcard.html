<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC Vocabulary Flashcard</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#eef2f7;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 12px 40px;}
#app{width:100%;max-width:480px;}
h1{font-family:'Lora',serif;font-size:16px;color:#1a1814;text-align:center;margin-bottom:3px;}
.sub{font-size:12px;color:#8a8478;text-align:center;margin-bottom:12px;}
.filters{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
.fb{padding:5px 11px;border-radius:99px;border:1px solid #e8e4dc;background:#fff;color:#8a8478;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.fb:hover{border-color:#2d7a4f;color:#2d7a4f;}
.fb.on{background:#2d7a4f;color:#fff;border-color:#2d7a4f;}
.fb.all-btn.on{background:#1a1814;border-color:#1a1814;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;}
.badge{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;padding:3px 10px;border-radius:99px;background:#e8e4dc;color:#8a8478;}
.ctr{font-size:13px;color:#8a8478;}
.pbar-bg{height:4px;background:#e8e4dc;border-radius:99px;margin-bottom:.4rem;}
.pbar{height:4px;background:linear-gradient(90deg,#2d7a4f,#52c48a);border-radius:99px;transition:width .4s;}
.plabels{display:flex;justify-content:space-between;font-size:11px;color:#8a8478;margin-bottom:.8rem;}
.pills{display:flex;gap:6px;margin-bottom:.9rem;}
.pill{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 4px;border-radius:99px;border:1px solid;font-size:12px;font-weight:500;}
.pl-p{background:#edf7f1;border-color:#a8d9bc;color:#2d7a4f;}
.pl-h{background:#fef3e2;border-color:#f5c97a;color:#a05c00;}
.pl-b{background:#fdf0f0;border-color:#f5a8a8;color:#b83232;}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.dp{background:#2d7a4f;}.dh{background:#a05c00;}.db{background:#b83232;}
.card{background:#fff;border:1px solid #e8e4dc;border-radius:20px;box-shadow:0 2px 14px rgba(0,0,0,.07);min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.8rem 1.2rem;margin-bottom:.8rem;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f5c97a,#52c48a,#85b7eb);opacity:.6;}
.card:hover:not(.done){transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.1);}
.ctag{font-size:10px;font-weight:600;letter-spacing:.8px;padding:3px 9px;border-radius:99px;background:#e8e4dc;color:#8a8478;margin-bottom:.7rem;}
.word{font-family:'Lora',serif;font-weight:700;color:#1a1814;line-height:1.2;text-align:center;}
.word.big{font-size:44px;}.word.med{font-size:34px;}.word.sm{font-size:26px;}.word.xs{font-size:20px;}.word.xxs{font-size:15px;}
.hint{font-size:13px;color:#8a8478;margin-top:.8rem;display:flex;align-items:center;gap:6px;}
.hint-ico{width:26px;height:26px;border-radius:50%;border:1px solid #e8e4dc;display:flex;align-items:center;justify-content:center;font-size:12px;}
.ans{margin-top:.8rem;text-align:center;animation:fup .25s ease;width:100%;}
@keyframes fup{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.divline{width:36px;height:1px;background:#e8e4dc;margin:0 auto .6rem;}
.pos{font-size:11px;font-weight:600;color:#8a8478;margin-bottom:4px;}
.meaning{font-size:17px;font-weight:600;color:#2d7a4f;margin-bottom:4px;}
.id-txt{font-size:13px;color:#8a8478;line-height:1.5;}
.ex-txt{font-size:11px;color:#5a7a6a;font-style:italic;margin-top:7px;line-height:1.6;border-left:2px solid #a8d9bc;padding-left:8px;text-align:left;width:100%;}
.syns{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:8px;}
.syn{font-size:11px;background:#edf7f1;border:1px solid #a8d9bc;color:#2d7a4f;border-radius:99px;padding:3px 10px;font-weight:500;}
.btnrow{display:flex;gap:7px;margin-bottom:.7rem;}
.cb{flex:1;padding:10px 5px;border-radius:13px;border:1.5px solid;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .14s;}
.cb-ico{font-size:16px;}.cb-sub{font-size:9px;font-weight:500;opacity:.7;}
.cb-p{background:#edf7f1;border-color:#a8d9bc;color:#2d7a4f;}.cb-p:hover{background:#d5f0e2;}
.cb-h{background:#fef3e2;border-color:#f5c97a;color:#a05c00;}.cb-h:hover{background:#fde8c2;}
.cb-b{background:#fdf0f0;border-color:#f5a8a8;color:#b83232;}.cb-b:hover{background:#f9d8d8;}
.res{text-align:center;padding:.8rem 0;}
.res-ico{font-size:50px;margin-bottom:.7rem;}
.res-title{font-family:'Lora',serif;font-size:18px;font-weight:700;color:#1a1814;margin-bottom:.3rem;}
.res-sub{font-size:13px;color:#8a8478;margin-bottom:1rem;line-height:1.6;}
.srow{display:flex;gap:7px;margin-bottom:1rem;}
.sbox{flex:1;padding:10px 5px;border-radius:13px;border:1px solid;text-align:center;}
.sbox .sn{font-size:21px;font-weight:700;}.sbox .sl{font-size:10px;margin-top:2px;}
.sbp{background:#edf7f1;border-color:#a8d9bc;color:#2d7a4f;}
.sbh{background:#fef3e2;border-color:#f5c97a;color:#a05c00;}
.sbb{background:#fdf0f0;border-color:#f5a8a8;color:#b83232;}
.rlist-wrap{text-align:left;margin-bottom:1rem;}
.rlist-ttl{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#8a8478;margin-bottom:6px;}
.rlist{border:1px solid #e8e4dc;border-radius:13px;overflow:hidden;max-height:200px;overflow-y:auto;}
.ri{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #e8e4dc;background:#fff;}
.ri:last-child{border-bottom:none;}
.ri-word{font-family:'Lora',serif;font-size:14px;font-weight:700;color:#1a1814;min-width:100px;}
.ri-pos{font-size:10px;color:#8a8478;}
.ri-id{font-size:11px;color:#2d7a4f;margin-left:auto;text-align:right;max-width:160px;}
.btnbig{width:100%;padding:13px;border-radius:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-bottom:8px;border:none;}
.btn-green{background:linear-gradient(135deg,#2d7a4f,#3da866);color:#fff;box-shadow:0 3px 10px rgba(45,122,79,.25);}
.btn-green:hover{opacity:.9;}
.btn-ghost{background:transparent;border:1.5px solid #e8e4dc !important;color:#8a8478;}
.btn-ghost:hover{background:#e8e4dc;}
.final{text-align:center;padding:2rem 0;}
</style>
</head>
<body>
<div id="app">
  <h1>TOEIC Vocabulary</h1>
  <div class="sub" id="tsub">Semua kategori</div>
  <div class="filters">
    <button class="fb all-btn on" onclick="setCat('ALL')">Semua</button>
    <button class="fb" onclick="setCat('VERB')">Kata Kerja</button>
    <button class="fb" onclick="setCat('NOUN')">Kata Benda</button>
    <button class="fb" onclick="setCat('ADJ')">Kata Sifat</button>
    <button class="fb" onclick="setCat('ADV')">Kata Keterangan</button>
    <button class="fb" onclick="setCat('PHRASE')">Frasa</button>
  </div>
  <div id="qv">
    <div class="topbar"><span class="badge" id="rb">Ronde 1</span><span class="ctr" id="ctr">1/--</span></div>
    <div class="pbar-bg"><div class="pbar" id="pb" style="width:0%"></div></div>
    <div class="plabels"><span id="pl">0 selesai</span><span id="pr">-- kartu</span></div>
    <div class="pills">
      <div class="pill pl-p"><span class="dot dp"></span>&nbsp;<span id="sp">0</span>&nbsp;Paham</div>
      <div class="pill pl-h"><span class="dot dh"></span>&nbsp;<span id="sh">0</span>&nbsp;Hampir</div>
      <div class="pill pl-b"><span class="dot db"></span>&nbsp;<span id="sb">0</span>&nbsp;Belum</div>
    </div>
    <div class="card" id="card" onclick="reveal()">
      <div class="ctag" id="ctag"></div>
      <div class="word" id="word"></div>
      <div class="hint" id="hint"><div class="hint-ico">&#128070;</div>Ketuk untuk lihat jawaban</div>
      <div class="ans" id="ans" style="display:none">
        <div class="divline"></div>
        <div class="pos" id="pos"></div>
        <div class="meaning" id="meaning"></div>
        <div class="id-txt" id="idt"></div>
        <div class="ex-txt" id="ext" style="display:none"></div>
        <div class="syns" id="syns"></div>
      </div>
    </div>
    <div class="btnrow" id="ba" style="display:none">
      <button class="cb cb-b" onclick="rate('b')"><span class="cb-ico">&#128533;</span><span>Belum paham</span><span class="cb-sub">Muncul lagi</span></button>
      <button class="cb cb-h" onclick="rate('h')"><span class="cb-ico">&#129300;</span><span>Hampir paham</span><span class="cb-sub">Muncul lagi</span></button>
      <button class="cb cb-p" onclick="rate('p')"><span class="cb-ico">&#10003;</span><span>Paham</span><span class="cb-sub">Tidak muncul lagi</span></button>
    </div>
  </div>
  <div id="rv" style="display:none">
    <div class="res">
      <div class="res-ico" id="ri"></div>
      <div class="res-title" id="rt"></div>
      <div class="res-sub" id="rs"></div>
      <div class="srow">
        <div class="sbox sbp"><div class="sn" id="rp">0</div><div class="sl">Paham</div></div>
        <div class="sbox sbh"><div class="sn" id="rh">0</div><div class="sl">Hampir paham</div></div>
        <div class="sbox sbb"><div class="sn" id="rbb">0</div><div class="sl">Belum paham</div></div>
      </div>
      <div id="rlw" style="display:none">
        <div class="rlist-wrap">
          <div class="rlist-ttl">Kartu untuk ronde berikutnya</div>
          <div class="rlist" id="rl"></div>
        </div>
      </div>
      <button class="btnbig btn-green" id="nb" onclick="nextRonde()"></button>
      <button class="btnbig btn-ghost" onclick="fullRestart()">Mulai dari awal</button>
    </div>
  </div>
  <div id="fv" style="display:none">
    <div class="final">
      <div style="font-size:60px;margin-bottom:.8rem">&#127942;</div>
      <div class="res-title">Semua dikuasai!</div>
      <div style="font-size:13px;color:#8a8478;margin:.5rem 0 1.3rem;">Vocab TOEIC kamu sudah siap!</div>
      <button class="btnbig btn-green" onclick="fullRestart()">Ulangi dari awal</button>
    </div>
  </div>
</div>

<script>
var V=[
// ── KATA KERJA (VERB) ──
{w:"implement",pos:"verb",cat:"VERB",m:"menerapkan",i:"melaksanakan rencana atau sistem",e:"The company will implement a new policy next month.",s:["execute","apply","carry out"]},
{w:"facilitate",pos:"verb",cat:"VERB",m:"memudahkan",i:"membuat proses menjadi lebih lancar",e:"The manager will facilitate the meeting.",s:["enable","support","streamline"]},
{w:"allocate",pos:"verb",cat:"VERB",m:"mengalokasikan",i:"membagikan sumber daya atau dana",e:"The budget was allocated to each department.",s:["assign","distribute","designate"]},
{w:"reimburse",pos:"verb",cat:"VERB",m:"mengganti biaya",i:"membayar kembali pengeluaran seseorang",e:"The company will reimburse your travel expenses.",s:["repay","refund","compensate"]},
{w:"expedite",pos:"verb",cat:"VERB",m:"mempercepat",i:"memperlancar agar selesai lebih cepat",e:"Please contact Matt Harven and remind him to expedite a summary to us.",s:["speed up","accelerate","rush"]},
{w:"comply",pos:"verb",cat:"VERB",m:"mematuhi",i:"mengikuti peraturan atau kebijakan",e:"All employees must comply with the safety regulations.",s:["obey","adhere to","conform to"]},
{w:"postpone",pos:"verb",cat:"VERB",m:"menunda",i:"memindahkan ke waktu yang lebih lambat",e:"The board meeting will be postponed to a later date.",s:["delay","defer","reschedule"]},
{w:"verify",pos:"verb",cat:"VERB",m:"memverifikasi",i:"memastikan kebenaran suatu informasi",e:"Please verify that all components are included.",s:["confirm","validate","authenticate"]},
{w:"negotiate",pos:"verb",cat:"VERB",m:"bernegosiasi",i:"berdiskusi untuk mencapai kesepakatan",e:"Both parties agreed to negotiate the contract terms.",s:["discuss","bargain","mediate"]},
{w:"submit",pos:"verb",cat:"VERB",m:"mengajukan / menyerahkan",i:"menyerahkan dokumen atau laporan",e:"Please review the attached order form and return it to me.",s:["hand in","present","file"]},
{w:"coordinate",pos:"verb",cat:"VERB",m:"mengoordinasikan",i:"mengatur agar semua bagian bekerja bersama",e:"She coordinated the annual company retreat in Tokyo.",s:["organize","manage","arrange"]},
{w:"evaluate",pos:"verb",cat:"VERB",m:"mengevaluasi",i:"menilai kualitas atau hasil sesuatu",e:"The team will evaluate the new software before launch.",s:["assess","review","appraise"]},
{w:"prohibit",pos:"verb",cat:"VERB",m:"melarang",i:"tidak mengizinkan sesuatu secara resmi",e:"The Marlton City Council does not have the authority to prohibit parking on city streets.",s:["ban","forbid","restrict"]},
{w:"require",pos:"verb",cat:"VERB",m:"memerlukan / mengharuskan",i:"sesuatu yang wajib ada atau dilakukan",e:"The project required the collaboration of several teams across the company.",s:["need","demand","necessitate"]},
{w:"accommodate",pos:"verb",cat:"VERB",m:"menampung / mengakomodasi",i:"menyediakan ruang atau memenuhi kebutuhan",e:"The space can accommodate up to 200 guests.",s:["house","hold","cater for"]},
{w:"register",pos:"verb",cat:"VERB",m:"mendaftar",i:"mencatat nama secara resmi untuk suatu kegiatan",e:"Registration for the Marketing Coalition Conference is now open until September 30.",s:["sign up","enroll","record"]},
{w:"donate",pos:"verb",cat:"VERB",m:"menyumbangkan",i:"memberikan sesuatu secara sukarela",e:"Those wishing to donate surplus produce can visit the Web site.",s:["contribute","give","offer"]},
{w:"distribute",pos:"verb",cat:"VERB",m:"mendistribusikan",i:"menyebarkan atau membagikan ke banyak pihak",e:"We will distribute your food donations to vetted groups.",s:["deliver","spread","hand out"]},
{w:"renovate",pos:"verb",cat:"VERB",m:"merenovasi",i:"memperbaiki atau memperbarui bangunan",e:"The Bryant Foyer was renovated just over a year ago.",s:["restore","refurbish","remodel"]},
{w:"revolutionize",pos:"verb",cat:"VERB",m:"merevolusi",i:"mengubah sesuatu secara mendasar dan besar",e:"This farm-to-table restaurant has revolutionized the local food scene.",s:["transform","overhaul","reinvent"]},
{w:"assemble",pos:"verb",cat:"VERB",m:"merakit",i:"menyatukan bagian-bagian menjadi satu",e:"Assemble the item on a soft surface or on the flattened empty box.",s:["build","put together","construct"]},
{w:"overtighten",pos:"verb",cat:"VERB",m:"mengencangkan terlalu kuat",i:"memutar sekrup atau baut melebihi batas yang aman",e:"Never overtighten any screws or bolts, or you may damage the wood.",s:["over-fasten","force","over-torque"]},
{w:"incorporate",pos:"verb",cat:"VERB",m:"memasukkan / menggabungkan",i:"menyertakan sesuatu ke dalam sesuatu yang lebih besar",e:"Assuming we receive that summary soon enough to incorporate its findings into the slides.",s:["include","integrate","embed"]},
{w:"highlight",pos:"verb",cat:"VERB",m:"menonjolkan",i:"membuat sesuatu lebih terlihat atau penting",e:"Our photos allow us to highlight the best features of a property.",s:["emphasize","showcase","feature"]},
{w:"overlook",pos:"verb",cat:"VERB",m:"mengabaikan / melewatkan",i:"tidak memperhatikan sesuatu yang penting",e:"Let us not overlook the information from the user studies.",s:["miss","ignore","neglect"]},
{w:"adhere",pos:"verb",cat:"VERB",m:"mematuhi / menempel",i:"mengikuti aturan atau menempel pada permukaan",e:"We ask that you adhere to the following guidelines.",s:["follow","comply with","stick to"]},
{w:"refrain",pos:"verb",cat:"VERB",m:"menahan diri",i:"tidak melakukan sesuatu secara sengaja",e:"Please refrain from making phone calls or texting at all times.",s:["abstain","avoid","hold back"]},
{w:"cater",pos:"verb",cat:"VERB",m:"menyediakan makanan / melayani",i:"menyediakan makanan untuk acara atau memenuhi kebutuhan",e:"The on-site restaurant caters our events.",s:["serve","provide","supply"]},
{w:"yield",pos:"verb",cat:"VERB",m:"menghasilkan",i:"memproduksi atau memberikan hasil",e:"This season's excellent weather has yielded a substantial harvest.",s:["produce","generate","deliver"]},
{w:"transport",pos:"verb",cat:"VERB",m:"mengangkut",i:"membawa barang atau orang dari satu tempat ke tempat lain",e:"Truck drivers have volunteered to transport your food donations.",s:["carry","ship","convey"]},
{w:"prove",pos:"verb",cat:"VERB",m:"membuktikan / terbukti",i:"menunjukkan bahwa sesuatu benar atau nyata",e:"Project manager Hannah Chung has proved to be very helpful.",s:["demonstrate","show","establish"]},
{w:"transform",pos:"verb",cat:"VERB",m:"mengubah / mentransformasi",i:"mengubah sesuatu secara signifikan",e:"Emerging technologies have already begun to transform the shipping industry.",s:["change","convert","alter"]},
{w:"predict",pos:"verb",cat:"VERB",m:"memprediksi",i:"memperkirakan apa yang akan terjadi",e:"The magazine predicts that the price of corn will rise 5 percent.",s:["forecast","project","anticipate"]},
{w:"recreate",pos:"verb",cat:"VERB",m:"membuat ulang",i:"menciptakan kembali sesuatu yang hilang atau rusak",e:"Mr. Hahm was able to recreate the meeting notes from memory.",s:["reproduce","rebuild","reconstruct"]},
{w:"handle",pos:"verb",cat:"VERB",m:"menangani",i:"mengurus atau mengelola sesuatu",e:"Airline representatives must handle a wide range of passenger issues.",s:["manage","deal with","address"]},
{w:"excel",pos:"verb",cat:"VERB",m:"unggul / berprestasi",i:"melakukan sesuatu dengan sangat baik",e:"Mr. Wu would excel in the role of event organizer.",s:["shine","stand out","surpass"]},
{w:"marinate",pos:"verb",cat:"VERB",m:"merendam dalam bumbu",i:"merendam makanan dalam bumbu sebelum dimasak",e:"The jerk chicken is marinated for 24 hours prior to grilling.",s:["soak","season","infuse"]},
{w:"investigate",pos:"verb",cat:"VERB",m:"menyelidiki",i:"memeriksa secara mendalam untuk menemukan fakta",e:"I would appreciate it if you could investigate the problem without delay.",s:["examine","probe","look into"]},
{w:"generate",pos:"verb",cat:"VERB",m:"menghasilkan / membuat",i:"memproduksi atau menciptakan sesuatu",e:"Invoices will be generated automatically each month.",s:["produce","create","issue"]},
{w:"equip",pos:"verb",cat:"VERB",m:"membekali / melengkapi",i:"memberikan alat atau kemampuan yang diperlukan",e:"The class equips you with the know-how to promote your business online.",s:["provide","furnish","prepare"]},
{w:"hone",pos:"verb",cat:"VERB",m:"mengasah / menyempurnakan",i:"meningkatkan keterampilan secara bertahap",e:"The class gives you expert guidance on how to hone your writing skills.",s:["sharpen","refine","improve"]},
{w:"appeal",pos:"verb",cat:"VERB",m:"menarik perhatian",i:"membuat sesuatu menarik bagi kelompok tertentu",e:"The class shows you how to appeal to your target market.",s:["attract","draw","engage"]},
{w:"acquire",pos:"verb",cat:"VERB",m:"memperoleh",i:"mendapatkan sesuatu melalui usaha atau pembelian",e:"The class helps you acquire the basic skills needed to start a business.",s:["gain","obtain","get"]},
{w:"accommodate",pos:"verb",cat:"VERB",m:"mengakomodasi",i:"menyesuaikan diri dengan kebutuhan atau permintaan",e:"Your ability to accommodate our last-minute requests was truly appreciated.",s:["adjust to","cater to","adapt to"]},
{w:"showcase",pos:"verb",cat:"VERB",m:"memamerkan",i:"menampilkan sesuatu agar terlihat terbaik",e:"We specialize in creating high-quality images that showcase properties.",s:["display","present","highlight"]},
{w:"customize",pos:"verb",cat:"VERB",m:"menyesuaikan",i:"mengubah sesuatu sesuai kebutuhan spesifik",e:"We are happy to work with you to customize orders.",s:["tailor","personalize","adapt"]},
{w:"compose",pos:"verb",cat:"VERB",m:"menyusun / mengomposisi",i:"membuat atau menciptakan sesuatu dengan hati-hati",e:"We take pride in composing interior and exterior shots.",s:["create","craft","produce"]},
{w:"spare",pos:"verb",cat:"VERB",m:"tidak segan / meluangkan",i:"tidak menahan usaha atau sumber daya",e:"Droplight Studio spares no effort in creating superior digital images.",s:["hold back","save","withhold"]},
];
// ── KATA BENDA (NOUN) ──
{w:"initiative",pos:"noun",cat:"NOUN",m:"inisiatif",i:"program atau langkah baru untuk tujuan tertentu",e:"The company launched a new initiative to reduce emissions.",s:["program","project","effort"]},
{w:"procedure",pos:"noun",cat:"NOUN",m:"prosedur",i:"langkah-langkah standar yang harus diikuti",e:"Please follow the standard procedure for filing reports.",s:["process","protocol","guidelines"]},
{w:"collaboration",pos:"noun",cat:"NOUN",m:"kolaborasi",i:"kerja sama antar tim atau departemen",e:"The project required the collaboration of several teams across the company.",s:["cooperation","teamwork","partnership"]},
{w:"inquiry",pos:"noun",cat:"NOUN",m:"pertanyaan / permintaan info",i:"permintaan informasi secara formal",e:"Our studio handles inquiries Monday through Saturday.",s:["question","query","request"]},

var LABELS={VERB:"Kata Kerja",NOUN:"Kata Benda",ADJ:"Kata Sifat",ADV:"Kata Keterangan",PHRASE:"Frasa",ALL:"Semua"};
function sh(a){return a.slice().sort(function(){return Math.random()-.5;});}
var deck,idx,ronde,cp,ch,cbv,rev,toRev,curCat="ALL";

function setCat(c){
  curCat=c;
  document.querySelectorAll(".fb").forEach(function(b){b.classList.remove("on");});
  document.querySelectorAll(".fb").forEach(function(b){
    if(b.getAttribute("onclick")==="setCat('"+c+"')") b.classList.add("on");
  });
  ronde=1; fullRestart();
}

function fullRestart(){
  var src=curCat==="ALL"?V:V.filter(function(v){return v.cat===curCat;});
  deck=sh(src);
  var total=deck.length;
  document.getElementById("tsub").textContent=
    (curCat==="ALL"?"Semua kategori -- "+total+" kata":LABELS[curCat]+" -- "+total+" kata");
  go();
}

function go(){
  idx=0;cp=0;ch=0;cbv=0;rev=false;toRev=[];
  show("qv");hide("rv");hide("fv");
  document.getElementById("rb").textContent="Ronde "+ronde;
  upStats();showCard();
}

function nextRonde(){ronde++;deck=sh(toRev);go();}

function showCard(){
  rev=false;
  var q=deck[idx];
  var el=document.getElementById("word");
  el.textContent=q.w;
  var l=q.w.length;
  el.className="word "+(l<=6?"big":l<=10?"med":l<=16?"sm":l<=24?"xs":"xxs");
  document.getElementById("ctag").textContent=LABELS[q.cat]||q.cat;
  document.getElementById("pos").textContent=q.pos;
  document.getElementById("meaning").textContent=q.m;
  document.getElementById("idt").textContent=q.i;
  var extEl=document.getElementById("ext");
  if(q.e){extEl.textContent='"'+q.e+'"';extEl.style.display="block";}
  else{extEl.style.display="none";}
  var synsEl=document.getElementById("syns");
  synsEl.innerHTML="";
  if(q.s){q.s.forEach(function(s){
    var span=document.createElement("span");
    span.className="syn";span.textContent=s;
    synsEl.appendChild(span);
  });}
  document.getElementById("ans").style.display="none";
  document.getElementById("hint").style.display="flex";
  document.getElementById("ba").style.display="none";
  document.getElementById("card").className="card";
  document.getElementById("ctr").textContent=(idx+1)+"/"+deck.length;
  var pct=Math.round(idx/deck.length*100);
  document.getElementById("pb").style.width=pct+"%";
  document.getElementById("pl").textContent=idx+" selesai";
  document.getElementById("pr").textContent=deck.length+" kartu";
}

function reveal(){
  if(rev)return;rev=true;
  document.getElementById("ans").style.display="block";
  document.getElementById("hint").style.display="none";
  document.getElementById("ba").style.display="flex";
  document.getElementById("card").className="card done";
}

function rate(r){
  var q=deck[idx];
  if(r==="p") cp++;
  else if(r==="h"){ch++;toRev.push(q);}
  else{cbv++;toRev.push(q);}
  upStats();idx++;
  if(idx>=deck.length){showResult();return;}
  showCard();
}

function upStats(){
  document.getElementById("sp").textContent=cp;
  document.getElementById("sh").textContent=ch;
  document.getElementById("sb").textContent=cbv;
}

function showResult(){
  document.getElementById("pb").style.width="100%";
  hide("qv");
  if(toRev.length===0){show("fv");return;}
  show("rv");
  document.getElementById("rp").textContent=cp;
  document.getElementById("rh").textContent=ch;
  document.getElementById("rbb").textContent=cbv;
  var pct=Math.round(cp/deck.length*100);
  document.getElementById("ri").textContent=pct>=90?"&#127775;":pct>=70?"&#128522;":pct>=50?"&#128170;":"&#128548;";
  document.getElementById("rt").textContent="Ronde "+ronde+" selesai!";
  document.getElementById("rs").textContent=
    pct>=90?"Hampir sempurna! "+toRev.length+" kartu tersisa.":
    pct>=70?"Bagus! "+toRev.length+" kartu perlu diulang.":
    pct>=50?"Lumayan! Ulangi "+toRev.length+" kartu.":
    "Semangat! "+toRev.length+" kartu menunggumu.";
  document.getElementById("nb").textContent="Lanjut Ronde "+(ronde+1)+" -> "+toRev.length+" kartu";
  var rl=document.getElementById("rl");
  rl.innerHTML="";
  toRev.forEach(function(v){
    var d=document.createElement("div");d.className="ri";
    d.innerHTML="<span class='ri-word'>"+v.w+"</span><div><div class='ri-pos'>"+v.pos+"</div></div><span class='ri-id'>"+v.m+"</span>";
    rl.appendChild(d);
  });
  document.getElementById("rlw").style.display="";
}

function show(id){document.getElementById(id).style.display="";}
function hide(id){document.getElementById(id).style.display="none";}

setCat("ALL");
</script>
