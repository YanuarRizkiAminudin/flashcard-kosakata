<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL iBT Simulation — Listening & Reading</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#eef2f7;font-family:'DM Sans',sans-serif;min-height:100vh;color:#111827}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:#1e3a5f;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.topbar-left{display:flex;align-items:center;gap:14px}
.back-btn{padding:7px 14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,.25)}
.test-label{font-size:15px;font-weight:700;letter-spacing:.3px}
.section-badge{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:99px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3)}

/* ── TIMER ── */
.timer-wrap{display:flex;align-items:center;gap:8px}
.timer-label{font-size:11px;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.5px}
.timer{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px;color:#fff;min-width:80px;text-align:right}
.timer.warn{color:#fbbf24}
.timer.danger{color:#f87171;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── PROGRESS ── */
.progress-bar-wrap{background:rgba(255,255,255,.15);height:4px;border-radius:99px;overflow:hidden;width:120px}
.progress-bar-fill{height:4px;background:linear-gradient(90deg,#60a5fa,#a78bfa);border-radius:99px;transition:width .3s}

/* ── SECTION SWITCHER ── */
.section-tabs{display:flex;background:#fff;border-bottom:2px solid #e5e7eb;padding:0 24px}
.sec-tab{padding:14px 20px;border:none;background:transparent;font-size:13px;font-weight:600;color:#9ca3af;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;display:flex;align-items:center;gap:6px}
.sec-tab.active{color:#1e3a5f;border-bottom-color:#1e3a5f}
.sec-tab .tab-count{font-size:11px;background:#e5e7eb;border-radius:99px;padding:2px 7px;font-weight:700}
.sec-tab.active .tab-count{background:#dbeafe;color:#1e40af}
.sec-tab.done .tab-count{background:#d1fae5;color:#065f46}

/* ── MAIN LAYOUT ── */
.main{max-width:820px;margin:0 auto;padding:28px 20px 100px;display:flex;flex-direction:column;gap:18px}

/* ── SECTION INTRO ── */
.section-intro{background:#fff;border-radius:16px;padding:28px 28px;border:1px solid #e5e7eb;text-align:center}
.section-intro h2{font-size:22px;font-weight:800;color:#1e3a5f;margin-bottom:8px}
.section-intro p{font-size:14px;color:#6b7280;line-height:1.7;max-width:520px;margin:0 auto 20px}
.intro-meta{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.meta-pill{background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;color:#3730a3}
.start-btn{padding:14px 40px;background:#1e3a5f;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.start-btn:hover{background:#1e40af;transform:scale(1.02)}

/* ── AUDIO PLAYER ── */
.audio-block{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid #e5e7eb;display:flex;flex-direction:column;gap:10px}
.audio-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#6b7280}
.audio-player-row{display:flex;align-items:center;gap:12px}
.audio-play-btn{width:44px;height:44px;border-radius:50%;background:#1e3a5f;border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.audio-play-btn:hover{background:#1e40af}
.audio-progress{flex:1;height:6px;background:#e5e7eb;border-radius:99px;cursor:pointer;position:relative}
.audio-progress-fill{height:6px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:99px;pointer-events:none;transition:width .1s linear}
.audio-time{font-size:12px;color:#9ca3af;font-variant-numeric:tabular-nums;white-space:nowrap}
.audio-note{font-size:12px;color:#f59e0b;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px}

/* ── PASSAGE ── */
.passage-block{background:#fff;border-radius:14px;padding:20px 22px;border:1px solid #e5e7eb}
.passage-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#6b7280;margin-bottom:10px}
.passage-text{font-size:14px;color:#374151;line-height:1.9;white-space:pre-line;background:#f9fafb;border-radius:10px;padding:16px;border:1px solid #f3f4f6;max-height:320px;overflow-y:auto}

/* ── QUESTION CARD ── */
.q-header-row{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:12px 16px;border:1px solid #e5e7eb}
.q-counter{font-size:14px;font-weight:700;color:#111827}
.q-section-chip{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:99px}
.chip-listening{background:#dbeafe;color:#1e40af}
.chip-reading{background:#d1fae5;color:#065f46}
.q-answered-info{font-size:13px;color:#9ca3af;margin-left:auto}

.progress-strip{height:4px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.progress-strip-fill{height:4px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:99px;transition:width .3s}

.question-card{background:#fff;border-radius:14px;padding:20px 22px;border:1px solid #e5e7eb}
.q-sentence{font-size:15px;color:#111827;line-height:1.7;margin-bottom:14px;font-weight:500}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:11px 16px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fff;font-size:14px;color:#374151;cursor:pointer;text-align:left;transition:all .15s;font-family:'DM Sans',sans-serif}
.opt:hover{border-color:#6b7280;background:#f3f4f6}
.opt.selected{border-color:#3b82f6;background:#eff6ff;font-weight:600;color:#1e40af}
.opt.correct{border-color:#16a34a;background:#f0fdf4;color:#15803d;font-weight:600}
.opt.wrong{border-color:#dc2626;background:#fef2f2;color:#dc2626;font-weight:600}

/* ── NAV ── */
.nav-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.nav-btn{padding:12px 24px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fff;font-size:14px;font-weight:600;color:#374151;cursor:pointer;transition:all .2s}
.nav-btn:hover:not(:disabled){border-color:#1e3a5f;color:#1e3a5f}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.nav-btn.next{background:#1e3a5f;color:#fff;border-color:#1e3a5f}
.nav-btn.next:hover:not(:disabled){background:#1e40af}
.nav-btn.submit-all{background:#059669;color:#fff;border-color:#059669;padding:12px 28px}
.nav-btn.submit-all:hover{background:#047857}

/* ── DOTS ── */
.dots-nav{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.dot-btn{width:10px;height:10px;border-radius:50%;border:none;background:#e5e7eb;cursor:pointer;transition:all .15s;padding:0}
.dot-btn.dot-answered{background:#93c5fd}
.dot-btn.dot-active{background:#1e3a5f;transform:scale(1.4)}
.dot-btn.dot-correct{background:#86efac}
.dot-btn.dot-wrong{background:#fca5a5}

/* ── RESULT ── */
.result-wrap{max-width:820px;margin:0 auto;padding:40px 20px 80px;display:flex;flex-direction:column;align-items:center;gap:16px}
.result-card{width:100%;background:#fff;border-radius:20px;padding:32px 28px;border:1px solid #e5e7eb;text-align:center}
.result-emoji{font-size:64px;margin-bottom:8px}
.result-title{font-size:28px;font-weight:800;color:#111827;margin-bottom:4px}
.result-sub{font-size:15px;color:#6b7280;margin-bottom:24px}
.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px}
.score-box{border-radius:14px;padding:16px 12px;border:1px solid}
.score-box .sn{font-size:28px;font-weight:800}
.score-box .sl{font-size:12px;font-weight:600;margin-top:4px;opacity:.8}
.sb-total{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
.sb-listen{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8}
.sb-read{background:#d1fae5;border-color:#6ee7b7;color:#065f46}
.toefl-score-note{font-size:13px;color:#6b7280;background:#f9fafb;border-radius:10px;padding:12px 16px;margin-bottom:20px;line-height:1.6}
.review-list{width:100%;display:flex;flex-direction:column;gap:5px;max-height:360px;overflow-y:auto;margin-bottom:20px;text-align:left}
.review-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px}
.r-correct{background:#f0fdf4;border:1px solid #86efac}
.r-wrong{background:#fef2f2;border:1px solid #fca5a5}
.r-num{font-weight:700;min-width:32px;color:#374151;flex-shrink:0}
.r-sec{font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;flex-shrink:0;margin-top:1px}
.r-sec-l{background:#dbeafe;color:#1e40af}
.r-sec-r{background:#d1fae5;color:#065f46}
.r-your{flex:1;color:#374151}
.r-ans{font-weight:600;flex-shrink:0}
.r-correct .r-ans{color:#16a34a}
.r-wrong .r-ans{color:#dc2626}
.retry-btn{padding:14px 40px;background:#1e3a5f;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.retry-btn:hover{background:#1e40af;transform:scale(1.02)}

/* ── TIME UP OVERLAY ── */
.timeup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;display:none}
.timeup-box{background:#fff;border-radius:20px;padding:40px 36px;text-align:center;max-width:380px;width:90%}
.timeup-box h2{font-size:24px;font-weight:800;color:#dc2626;margin-bottom:8px}
.timeup-box p{font-size:14px;color:#6b7280;margin-bottom:24px;line-height:1.6}
.timeup-btn{padding:14px 36px;background:#1e3a5f;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}

@media(max-width:600px){
  .topbar{padding:10px 14px;gap:10px}
  .test-label{font-size:13px}
  .timer{font-size:18px}
  .score-grid{grid-template-columns:1fr 1fr}
  .section-tabs{padding:0 12px}
  .sec-tab{padding:12px 12px;font-size:12px}
}
</style>
</head>
<body>

<!-- TIME UP OVERLAY -->
<div class="timeup-overlay" id="timeup-overlay">
  <div class="timeup-box">
    <div style="font-size:48px;margin-bottom:12px">⏰</div>
    <h2>Time is Up!</h2>
    <p>Your 2-hour test session has ended. Your answers have been submitted automatically.</p>
    <button class="timeup-btn" onclick="forceSubmit()">See My Results</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <span class="test-label">TOEFL iBT Simulation</span>
    <span class="section-badge" id="section-badge">Listening</span>
  </div>
  <div class="timer-wrap">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="timer-progress" style="width:100%"></div></div>
    <span class="timer-label">TIME</span>
    <span class="timer" id="timer">2:00:00</span>
  </div>
</div>

<!-- SECTION TABS -->
<div class="section-tabs" id="section-tabs">
  <button class="sec-tab active" id="tab-listening" onclick="switchSection('listening')">
    🎧 Listening <span class="tab-count" id="tab-l-count">0/34</span>
  </button>
  <button class="sec-tab" id="tab-reading" onclick="switchSection('reading')">
    📖 Reading <span class="tab-count" id="tab-r-count">0/36</span>
  </button>
</div>

<!-- MAIN CONTENT -->
<div id="main-content"></div>

<!-- RESULT -->
<div id="result-content" style="display:none"></div>

  { id:43, section:'R', passageTitle:'Coral Reef Ecosystems',
    passage:`Coral reefs are among the most diverse and productive ecosystems on Earth, often referred to as the "rainforests of the sea." These underwater structures are built by colonies of tiny animals called coral polyps, which secrete calcium carbonate to form hard skeletons. Over thousands of years, these skeletons accumulate to create the massive reef structures we see today.

  { id:51, section:'R', passageTitle:'The Development of Language',
    passage:`The origin of human language remains one of the most intriguing questions in anthropology and linguistics. Unlike other forms of animal communication, human language is characterized by its complexity, flexibility, and ability to convey abstract concepts. Researchers have proposed various theories about how language evolved, but no single explanation has gained universal acceptance.

One prominent theory suggests that language developed gradually from simpler forms of communication used by early hominids. According to this view, proto-language may have consisted of basic vocalizations and gestures that conveyed immediate needs and emotions. Over time, these primitive signals became more sophisticated, eventually evolving into the complex grammatical structures we use today.

Another theory posits that language emerged suddenly, perhaps due to a genetic mutation that gave early humans the cognitive capacity for symbolic thought and syntax. Proponents of this "language instinct" hypothesis argue that the human brain is uniquely wired for language acquisition, as evidenced by the ease with which children learn to speak.

Archaeological evidence provides some clues about when language might have emerged. The development of complex tools, art, and social structures around 50,000 to 100,000 years ago suggests that early humans possessed advanced cognitive abilities, including language. However, because language leaves no direct fossil record, its exact origins remain speculative.

  { id:59, section:'R', passageTitle:'Renewable Energy Sources',
    passage:`As concerns about climate change and fossil fuel depletion grow, renewable energy sources have become increasingly important. Solar, wind, hydroelectric, and geothermal power offer sustainable alternatives to coal, oil, and natural gas. Each renewable energy source has distinct advantages and challenges that affect its viability in different regions.

Solar energy harnesses sunlight using photovoltaic cells or solar thermal systems. It is abundant and can be deployed at various scales, from small rooftop panels to large solar farms. However, solar power generation is intermittent, depending on weather conditions and time of day. Energy storage systems, such as batteries, are essential for maintaining a consistent power supply.

Wind energy captures the kinetic energy of moving air through turbines. Wind farms can be located onshore or offshore, with offshore installations generally producing more consistent power due to stronger and steadier winds. Like solar power, wind energy is intermittent and requires backup systems or energy storage to ensure reliability.

Hydroelectric power generates electricity by harnessing the energy of flowing water, typically through dams. It is one of the oldest and most reliable forms of renewable energy, capable of providing baseload power. However, large dam projects can have significant environmental and social impacts, including habitat disruption and displacement of communities.

Geothermal energy taps into heat from the Earth's interior to generate electricity or provide direct heating. It is highly reliable and produces minimal emissions, but it is geographically limited to regions with accessible geothermal resources, such as volcanic areas or tectonic plate boundaries.

  { id:67, section:'R', passageTitle:'The Role of Sleep in Learning',
    passage:`Sleep plays a critical role in learning and memory consolidation. During sleep, the brain processes and organizes information acquired during waking hours, transferring it from short-term to long-term memory. Research has shown that adequate sleep enhances cognitive performance, problem-solving abilities, and creativity.

Sleep deprivation has been shown to impair attention, decision-making, and emotional regulation. Students who sacrifice sleep to study often perform worse on exams than those who get sufficient rest. Chronic sleep deprivation can also have long-term health consequences, including increased risk of cardiovascular disease, obesity, and mental health disorders.

// Timer: 2 hours = 7200 seconds
var TOTAL_SECONDS = 7200;
var secondsLeft = TOTAL_SECONDS;
var timerInterval = null;

// ═══════════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════════
function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(function() {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timeup-overlay').style.display = 'flex';
    }
  }, 1000);
}

function updateTimerDisplay() {
  var h = Math.floor(secondsLeft / 3600);
  var m = Math.floor((secondsLeft % 3600) / 60);
  var s = secondsLeft % 60;
  var str = h + ':' + pad(m) + ':' + pad(s);
  var el = document.getElementById('timer');
  el.textContent = str;
  el.className = 'timer';
  if (secondsLeft <= 600) el.className = 'timer danger';
  else if (secondsLeft <= 1800) el.className = 'timer warn';
  var pct = (secondsLeft / TOTAL_SECONDS * 100).toFixed(1);
  document.getElementById('timer-progress').style.width = pct + '%';
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function forceSubmit() {
  document.getElementById('timeup-overlay').style.display = 'none';
  submitted = true;
  showResult();
}

  currentSection = sec;

  document.getElementById('tab-listening').className = 'sec-tab' + (sec === 'listening' ? ' active' : '');
  document.getElementById('tab-reading').className = 'sec-tab' + (sec === 'reading' ? ' active' : '');
  document.getElementById('section-badge').textContent = sec === 'listening' ? 'Listening' : 'Reading';
  if (!sectionStarted[sec]) {
    showSectionIntro(sec);
  } else {
    renderQuestion();
  }
  updateTabCounts();
}

function showSectionIntro(sec) {
  var main = document.getElementById('main-content');
  if (sec === 'listening') {
    main.innerHTML = `
      <div class="main">
        <div class="section-intro">
          <div style="font-size:52px;margin-bottom:12px">🎧</div>
          <h2>Listening Section</h2>
          <p>You will listen to conversations and lectures, then answer questions about what you heard. Each audio will play automatically when you reach that question group.</p>
          <div class="intro-meta">
            <div class="meta-pill">📝 34 Questions</div>
            <div class="meta-pill">🎙️ 3 Conversations + 3 Lectures</div>
            <div class="meta-pill">⏱️ Part of 2-hour total</div>
          </div>
          <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;font-size:13px;color:#92400e;margin-bottom:20px;text-align:left">
            ⚠️ <strong>Audio note:</strong> Replace <code>Test_01.mp3</code> with your actual audio file in the same folder. The player will appear on each question group.
          </div>
          <button class="start-btn" onclick="startSection('listening')">Start Listening Section →</button>
        </div>
      </div>`;
  } else {
    main.innerHTML = `
      <div class="main">
        <div class="section-intro">
          <div style="font-size:52px;margin-bottom:12px">📖</div>
          <h2>Reading Section</h2>
          <p>You will read academic passages and answer comprehension questions. You can scroll back to re-read the passage at any time.</p>
          <div class="intro-meta">
            <div class="meta-pill">📝 36 Questions</div>
            <div class="meta-pill">📄 5 Passages</div>
            <div class="meta-pill">⏱️ Part of 2-hour total</div>
          </div>
          <button class="start-btn" onclick="startSection('reading')">Start Reading Section →</button>
        </div>
      </div>`;
  }
}

function startSection(sec) {
  sectionStarted[sec] = true;
  startTimer();
  renderQuestion();
}

// ═══════════════════════════════════════════════════════════
// RENDER QUESTION
// ═══════════════════════════════════════════════════════════
function renderQuestion() {
  if (submitted) { showResult(); return; }
  var list = currentSection === 'listening' ? LISTENING : READING;
  var q = list[currentIdx];
  var totalInSection = list.length;
  var answeredInSection = list.filter(function(x){ return answers[x.id] !== undefined; }).length;
  var globalIdx = currentSection === 'listening' ? currentIdx : LISTENING.length + currentIdx;
  var pct = Math.round((currentIdx + 1) / totalInSection * 100);
  var isLast = currentIdx === totalInSection - 1;
  var isLastOverall = currentSection === 'reading' && isLast;

  var chipClass = currentSection === 'listening' ? 'chip-listening' : 'chip-reading';
  var chipLabel = currentSection === 'listening' ? '🎧 Listening' : '📖 Reading';

  // Audio block (listening only — show when first question of a group)
  var audioHtml = '';
  if (currentSection === 'listening') {
    var prevQ = currentIdx > 0 ? LISTENING[currentIdx - 1] : null;
    var showAudio = !prevQ || prevQ.audioLabel !== q.audioLabel;
    if (showAudio) {
      audioHtml = `
        <div class="audio-block">
          <div class="audio-label">🎧 ${q.audioLabel}</div>
          <div class="audio-player-row">
            <button class="audio-play-btn" id="play-btn-${q.id}" onclick="toggleAudio('${q.audio}', ${q.id})">▶</button>
            <div class="audio-progress" id="prog-${q.id}" onclick="seekAudio(event, ${q.id})">
              <div class="audio-progress-fill" id="prog-fill-${q.id}" style="width:0%"></div>
            </div>
            <span class="audio-time" id="audio-time-${q.id}">0:00 / 0:00</span>
          </div>
          <div class="audio-note">⚠️ Place your audio file as <strong>Test_01.mp3</strong> in the same folder to enable playback.</div>
        </div>`;
    }
  }

  // Passage block
  var passageHtml = '';
  if (q.passage) {
    var passTitle = q.passageTitle || q.audioLabel || '';
    passageHtml = `
      <div class="passage-block">
        <div class="passage-title">${passTitle}</div>
        <div class="passage-text">${q.passage}</div>
      </div>`;
  }

  // Options
  var optsHtml = q.opts.map(function(opt) {
    var cls = 'opt';
    if (submitted) {
      if (opt === q.answer) cls = 'opt correct';
      else if (answers[q.id] === opt) cls = 'opt wrong';
    } else {
      if (answers[q.id] === opt) cls = 'opt selected';
    }
    return `<button class="${cls}" onclick="selectAnswer(${q.id}, '${opt.replace(/'/g,"\\'")}', this)">${opt}</button>`;
  }).join('');

  // Nav buttons
  var navHtml = '';
  if (isLastOverall && !submitted) {
    navHtml = `
      <button class="nav-btn" onclick="prevQ()" ${currentIdx === 0 ? 'disabled' : ''}>← Prev</button>
      <button class="nav-btn submit-all" onclick="submitAll()">✅ Submit All Answers</button>`;
  } else if (isLast && currentSection === 'listening') {
    navHtml = `
      <button class="nav-btn" onclick="prevQ()" ${currentIdx === 0 ? 'disabled' : ''}>← Prev</button>
      <button class="nav-btn next" onclick="switchSection('reading')">Go to Reading →</button>`;
  } else {
    navHtml = `
      <button class="nav-btn" onclick="prevQ()" ${currentIdx === 0 ? 'disabled' : ''}>← Prev</button>
      <button class="nav-btn next" onclick="nextQ()" ${!answers[q.id] && !submitted ? 'disabled' : ''}>Next →</button>`;
  }

  // Dots
  var dotsHtml = list.map(function(qq, i) {
    var cls = 'dot-btn';
    if (i === currentIdx) cls += ' dot-active';
    if (submitted) {
      cls += answers[qq.id] === qq.answer ? ' dot-correct' : ' dot-wrong';
    } else if (answers[qq.id]) {
      cls += ' dot-answered';
    }
    return `<button class="${cls}" onclick="jumpTo(${i})" title="Q${qq.id}"></button>`;
  }).join('');

  var main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="main">
      ${audioHtml}
      ${passageHtml}
      <div class="q-header-row">
        <span class="q-counter">Q${globalIdx + 1} of ${ALL.length}</span>
        <span class="q-section-chip ${chipClass}">${chipLabel}</span>
        <span class="q-answered-info">${answeredInSection}/${totalInSection} answered</span>
      </div>
      <div class="progress-strip"><div class="progress-strip-fill" style="width:${pct}%"></div></div>
      <div class="question-card">
        <p class="q-sentence">${q.text}</p>
        <div class="opts">${optsHtml}</div>
      </div>
      <div class="nav-row">${navHtml}</div>
      <div class="dots-nav">${dotsHtml}</div>
    </div>`;

  updateTabCounts();
}

// ═══════════════════════════════════════════════════════════
// ANSWER & NAVIGATION
// ═══════════════════════════════════════════════════════════
function selectAnswer(id, opt, btn) {
  if (submitted) return;
  answers[id] = opt;
  // Re-render opts only
  var list = currentSection === 'listening' ? LISTENING : READING;
  var q = list[currentIdx];
  var optsEl = btn.closest('.opts');
  optsEl.querySelectorAll('.opt').forEach(function(b) {
    b.className = 'opt';
    if (b.textContent.trim() === opt.trim()) b.className = 'opt selected';
  });
  // Enable next button
  var nextBtn = document.querySelector('.nav-btn.next');
  if (nextBtn) nextBtn.disabled = false;
  updateTabCounts();
  // Auto-advance after 600ms
  setTimeout(function() {
    var list2 = currentSection === 'listening' ? LISTENING : READING;
    var isLast = currentIdx === list2.length - 1;
    var isLastOverall = currentSection === 'reading' && isLast;
    if (!isLastOverall && !isLast) {
      nextQ();
    } else if (isLast && currentSection === 'listening') {
      // stay, let user click Go to Reading
    }
  }, 700);
}

function nextQ() {
  var list = currentSection === 'listening' ? LISTENING : READING;
  if (currentIdx < list.length - 1) {
    currentIdx++;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function jumpTo(i) {
  currentIdx = i;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateTabCounts() {
  var la = LISTENING.filter(function(q){ return answers[q.id] !== undefined; }).length;
  var ra = READING.filter(function(q){ return answers[q.id] !== undefined; }).length;
  document.getElementById('tab-l-count').textContent = la + '/' + LISTENING.length;
  document.getElementById('tab-r-count').textContent = ra + '/' + READING.length;
  var tabL = document.getElementById('tab-listening');
  var tabR = document.getElementById('tab-reading');
  if (la === LISTENING.length) tabL.classList.add('done'); else tabL.classList.remove('done');
  if (ra === READING.length) tabR.classList.add('done'); else tabR.classList.remove('done');
}

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
var currentAudio = null;
var currentAudioId = null;

function toggleAudio(src, id) {
  if (currentAudio && currentAudioId === id) {
    if (currentAudio.paused) { currentAudio.play(); document.getElementById('play-btn-' + id).textContent = '⏸'; }
    else { currentAudio.pause(); document.getElementById('play-btn-' + id).textContent = '▶'; }
    return;
  }
  if (currentAudio) { currentAudio.pause(); }
  currentAudio = new Audio(src);
  currentAudioId = id;
  currentAudio.addEventListener('timeupdate', function() {
    var pct = currentAudio.duration ? (currentAudio.currentTime / currentAudio.duration * 100) : 0;
    var fill = document.getElementById('prog-fill-' + id);
    var timeEl = document.getElementById('audio-time-' + id);
    if (fill) fill.style.width = pct + '%';
    if (timeEl) timeEl.textContent = fmtTime(currentAudio.currentTime) + ' / ' + fmtTime(currentAudio.duration || 0);
  });
  currentAudio.addEventListener('ended', function() {
    var btn = document.getElementById('play-btn-' + id);
    if (btn) btn.textContent = '▶';
  });
  currentAudio.play();
  document.getElementById('play-btn-' + id).textContent = '⏸';
}

function seekAudio(e, id) {
  if (!currentAudio || currentAudioId !== id) return;
  var bar = document.getElementById('prog-' + id);
  var rect = bar.getBoundingClientRect();
  var ratio = (e.clientX - rect.left) / rect.width;
  currentAudio.currentTime = ratio * currentAudio.duration;
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  var m = Math.floor(s / 60);
  var sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ═══════════════════════════════════════════════════════════
// SUBMIT & RESULT
// ═══════════════════════════════════════════════════════════
function submitAll() {
  if (currentAudio) currentAudio.pause();
  clearInterval(timerInterval);
  submitted = true;
  showResult();
}

function showResult() {
  document.getElementById('section-tabs').style.display = 'none';
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('result-content').style.display = 'block';

  var lScore = LISTENING.filter(function(q){ return answers[q.id] === q.answer; }).length;
  var rScore = READING.filter(function(q){ return answers[q.id] === q.answer; }).length;
  var total = lScore + rScore;
  var totalQ = ALL.length;

  // TOEFL iBT scaled score estimate (0-30 per section, 0-120 total)
  var lScaled = Math.round((lScore / LISTENING.length) * 30);
  var rScaled = Math.round((rScore / READING.length) * 30);
  var totalScaled = lScaled + rScaled;

  var emoji = total / totalQ >= 0.8 ? '🏆' : total / totalQ >= 0.6 ? '🎯' : '📚';
  var grade = total / totalQ >= 0.8 ? 'Excellent!' : total / totalQ >= 0.6 ? 'Good Job!' : 'Keep Practicing!';

  var reviewHtml = ALL.map(function(q) {
    var correct = answers[q.id] === q.answer;
    var secCls = q.section === 'L' ? 'r-sec-l' : 'r-sec-r';
    var secLabel = q.section === 'L' ? 'L' : 'R';
    return `<div class="review-item ${correct ? 'r-correct' : 'r-wrong'}">
      <span class="r-num">Q${q.id}</span>
      <span class="r-sec ${secCls}">${secLabel}</span>
      <span class="r-your">Your: ${answers[q.id] || '—'}</span>
      <span class="r-ans">${correct ? '✓' : '✗'} ${q.answer}</span>
    </div>`;
  }).join('');

  var timeUsed = TOTAL_SECONDS - secondsLeft;
  var th = Math.floor(timeUsed / 3600);
  var tm = Math.floor((timeUsed % 3600) / 60);
  var ts = timeUsed % 60;
  var timeStr = th + 'h ' + pad(tm) + 'm ' + pad(ts) + 's';

  document.getElementById('result-content').innerHTML = `
    <div class="result-wrap">
      <div class="result-card">
        <div class="result-emoji">${emoji}</div>
        <div class="result-title">${grade}</div>
        <div class="result-sub">${total}/${totalQ} correct · Time used: ${timeStr}</div>
        <div class="score-grid">
          <div class="score-box sb-total">
            <div class="sn">${totalScaled}/60</div>
            <div class="sl">Total Score</div>
          </div>
          <div class="score-box sb-listen">
            <div class="sn">${lScaled}/30</div>
            <div class="sl">Listening</div>
          </div>
          <div class="score-box sb-read">
            <div class="sn">${rScaled}/30</div>
            <div class="sl">Reading</div>
          </div>
        </div>
        <div class="toefl-score-note">
          📊 <strong>Score Estimate:</strong> This simulation covers Listening + Reading only (max 60 pts of the full 120-pt iBT).
          Full TOEFL iBT also includes Speaking (0–30) and Writing (0–30).<br>
          <strong>Listening:</strong> ${lScore}/${LISTENING.length} correct → ~${lScaled}/30 &nbsp;|&nbsp;
          <strong>Reading:</strong> ${rScore}/${READING.length} correct → ~${rScaled}/30
        </div>
        <div class="review-list">${reviewHtml}</div>
        <button class="retry-btn" onclick="restartTest()">�� Try Again</button>
      </div>
    </div>`;
}

function restartTest() {
  answers = {};
  currentSection = 'listening';
  currentIdx = 0;
  submitted = false;
  sectionStarted = { listening: false, reading: false };
  secondsLeft = TOTAL_SECONDS;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  updateTimerDisplay();
  document.getElementById('section-tabs').style.display = 'flex';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('result-content').style.display = 'none';
  document.getElementById('tab-listening').className = 'sec-tab active';
  document.getElementById('tab-reading').className = 'sec-tab';
  document.getElementById('section-badge').textContent = 'Listening';
  updateTabCounts();
  showSectionIntro('listening');
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
updateTimerDisplay();
updateTabCounts();
showSectionIntro('listening');

</script>
