<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL iBT Simulation — Listening & Reading</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#eef2f7;font-family:'DM Sans',sans-serif;min-height:100vh;color:#111827}
.topbar{position:sticky;top:0;z-index:100;background:#1e3a5f;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.topbar-left{display:flex;align-items:center;gap:14px}
.back-btn{padding:7px 14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,.25)}
.test-label{font-size:15px;font-weight:700}
.section-badge{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:99px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3)}
.timer-wrap{display:flex;align-items:center;gap:8px}
.timer-label{font-size:11px;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.5px}
.timer{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px;color:#fff;min-width:80px;text-align:right}
.timer.warn{color:#fbbf24}
.timer.danger{color:#f87171;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.progress-bar-wrap{background:rgba(255,255,255,.15);height:4px;border-radius:99px;overflow:hidden;width:120px}
.progress-bar-fill{height:4px;background:linear-gradient(90deg,#60a5fa,#a78bfa);border-radius:99px;transition:width .3s}
.section-tabs{display:flex;background:#fff;border-bottom:2px solid #e5e7eb;padding:0 24px}
.sec-tab{padding:14px 20px;border:none;background:transparent;font-size:13px;font-weight:600;color:#9ca3af;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;display:flex;align-items:center;gap:6px}
.sec-tab.active{color:#1e3a5f;border-bottom-color:#1e3a5f}
.sec-tab .tab-count{font-size:11px;background:#e5e7eb;border-radius:99px;padding:2px 7px;font-weight:700}
.sec-tab.active .tab-count{background:#dbeafe;color:#1e40af}
.sec-tab.done .tab-count{background:#d1fae5;color:#065f46}
.main{max-width:820px;margin:0 auto;padding:28px 20px 100px;display:flex;flex-direction:column;gap:18px}
.section-intro{background:#fff;border-radius:16px;padding:32px 28px;border:1px solid #e5e7eb;text-align:center}
.section-intro h2{font-size:22px;font-weight:800;color:#1e3a5f;margin-bottom:8px}
.section-intro p{font-size:14px;color:#6b7280;line-height:1.7;max-width:520px;margin:0 auto 20px}
.intro-meta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.meta-pill{background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;color:#3730a3}
.start-btn{padding:14px 40px;background:#1e3a5f;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.start-btn:hover{background:#1e40af;transform:scale(1.02)}
.audio-block{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid #e5e7eb;display:flex;flex-direction:column;gap:10px}
.audio-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#6b7280}
.audio-player-row{display:flex;align-items:center;gap:12px}
.audio-play-btn{width:44px;height:44px;border-radius:50%;background:#1e3a5f;border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.audio-play-btn:hover{background:#1e40af}
.audio-progress{flex:1;height:6px;background:#e5e7eb;border-radius:99px;cursor:pointer;position:relative}
.audio-progress-fill{height:6px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:99px;pointer-events:none;transition:width .1s linear}
.audio-time{font-size:12px;color:#9ca3af;font-variant-numeric:tabular-nums;white-space:nowrap}
.audio-note{font-size:12px;color:#f59e0b;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px}
.passage-block{background:#fff;border-radius:14px;padding:20px 22px;border:1px solid #e5e7eb}
.passage-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#6b7280;margin-bottom:10px}
.passage-text{font-size:14px;color:#374151;line-height:1.9;white-space:pre-line;background:#f9fafb;border-radius:10px;padding:16px;border:1px solid #f3f4f6;max-height:300px;overflow-y:auto}
.q-header-row{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:12px 16px;border:1px solid #e5e7eb}
.q-counter{font-size:14px;font-weight:700;color:#111827}
.q-section-chip{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:99px}
.chip-listening{background:#dbeafe;color:#1e40af}
.chip-reading{background:#d1fae5;color:#065f46}
.q-answered-info{font-size:13px;color:#9ca3af;margin-left:auto}
.progress-strip{height:4px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.progress-strip-fill{height:4px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:99px;transition:width .3s}
.question-card{background:#fff;border-radius:14px;padding:20px 22px;border:1px solid #e5e7eb}
.part-chip{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#4f46e5;background:#eef2ff;border-radius:99px;padding:5px 14px;align-self:flex-start}
.q-sentence{font-size:15px;color:#111827;line-height:1.7;margin-bottom:14px;font-weight:500}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:11px 16px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fff;font-size:14px;color:#374151;cursor:pointer;text-align:left;transition:all .15s;font-family:'DM Sans',sans-serif}
.opt:hover{border-color:#6b7280;background:#f3f4f6}
.opt.selected{border-color:#3b82f6;background:#eff6ff;font-weight:600;color:#1e40af}
.opt.correct{border-color:#16a34a;background:#f0fdf4;color:#15803d;font-weight:600}
.opt.wrong{border-color:#dc2626;background:#fef2f2;color:#dc2626;font-weight:600}
.nav-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.nav-btn{padding:12px 24px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fff;font-size:14px;font-weight:600;color:#374151;cursor:pointer;transition:all .2s}
.nav-btn:hover:not(:disabled){border-color:#1e3a5f;color:#1e3a5f}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.nav-btn.next{background:#1e3a5f;color:#fff;border-color:#1e3a5f}
.nav-btn.next:hover:not(:disabled){background:#1e40af}
.nav-btn.go-reading{background:#059669;color:#fff;border-color:#059669}
.nav-btn.go-reading:hover{background:#047857}
.nav-btn.submit-all{background:#dc2626;color:#fff;border-color:#dc2626;padding:12px 28px}
.nav-btn.submit-all:hover{background:#b91c1c}
.dots-nav{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.dot-btn{width:10px;height:10px;border-radius:50%;border:none;background:#e5e7eb;cursor:pointer;transition:all .15s;padding:0}
.dot-btn.dot-answered{background:#93c5fd}
.dot-btn.dot-active{background:#1e3a5f;transform:scale(1.4)}
.dot-btn.dot-correct{background:#86efac}
.dot-btn.dot-wrong{background:#fca5a5}
.result-wrap{max-width:820px;margin:0 auto;padding:40px 20px 80px;display:flex;flex-direction:column;align-items:center;gap:16px}
.result-card{width:100%;background:#fff;border-radius:20px;padding:32px 28px;border:1px solid #e5e7eb;text-align:center}
.result-emoji{font-size:64px;margin-bottom:8px}
.result-title{font-size:28px;font-weight:800;color:#111827;margin-bottom:4px}
.result-sub{font-size:15px;color:#6b7280;margin-bottom:24px}
.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.score-box{border-radius:14px;padding:16px 12px;border:1px solid;text-align:center}
.score-box .sn{font-size:28px;font-weight:800}
.score-box .sl{font-size:12px;font-weight:600;margin-top:4px;opacity:.8}
.sb-total{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
.sb-listen{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8}
.sb-read{background:#d1fae5;border-color:#6ee7b7;color:#065f46}
.score-note{font-size:13px;color:#374151;background:#f9fafb;border-radius:12px;padding:16px 18px;margin-bottom:20px;line-height:1.8;text-align:left;border:1px solid #e5e7eb}
.score-note strong{color:#1e3a5f}
.review-list{width:100%;display:flex;flex-direction:column;gap:5px;max-height:400px;overflow-y:auto;margin-bottom:20px;text-align:left}
.review-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px}
.r-correct{background:#f0fdf4;border:1px solid #86efac}
.r-wrong{background:#fef2f2;border:1px solid #fca5a5}
.r-num{font-weight:700;min-width:36px;color:#374151;flex-shrink:0}
.r-sec{font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;flex-shrink:0;margin-top:1px}
.r-sec-l{background:#dbeafe;color:#1e40af}
.r-sec-r{background:#d1fae5;color:#065f46}
.r-your{flex:1;color:#374151;font-size:12px}
.r-ans{font-weight:600;flex-shrink:0;font-size:12px}
.r-correct .r-ans{color:#16a34a}
.r-wrong .r-ans{color:#dc2626}
.retry-btn{padding:14px 40px;background:#1e3a5f;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.retry-btn:hover{background:#1e40af;transform:scale(1.02)}
.timeup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center}
.timeup-box{background:#fff;border-radius:20px;padding:40px 36px;text-align:center;max-width:380px;width:90%}
.timeup-box h2{font-size:24px;font-weight:800;color:#dc2626;margin-bottom:8px}
.timeup-box p{font-size:14px;color:#6b7280;margin-bottom:24px;line-height:1.6}
.timeup-btn{padding:14px 36px;background:#1e3a5f;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
@media(max-width:600px){
  .topbar{padding:10px 14px;gap:8px}
  .test-label{font-size:12px}
  .timer{font-size:17px;min-width:60px}
  .score-grid{grid-template-columns:1fr 1fr}
  .section-tabs{padding:0 10px}
  .sec-tab{padding:10px 10px;font-size:12px}
  .progress-bar-wrap{width:70px}
}
</style>
</head>
<body>
<div class="timeup-overlay" id="timeup-overlay" style="display:none">
  <div class="timeup-box">
    <div style="font-size:48px;margin-bottom:12px">⏰</div>
    <h2>Time is Up!</h2>
    <p>Your 2-hour test session has ended. Your answers have been submitted automatically.</p>
    <button class="timeup-btn" onclick="forceSubmit()">See My Results</button>
  </div>
</div>
<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <span class="test-label">TOEFL iBT Simulation</span>
    <span class="section-badge" id="section-badge">Listening</span>
  </div>
  <div class="timer-wrap">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="timer-progress" style="width:100%"></div></div>
    <span class="timer-label">TIME</span>
    <span class="timer" id="timer">2:00:00</span>
  </div>
</div>
<div class="section-tabs" id="section-tabs">
  <button class="sec-tab active" id="tab-L" onclick="switchSection('L')">
    🎧 Listening <span class="tab-count" id="tab-L-count">0/100</span>
  </button>
  <button class="sec-tab" id="tab-R" onclick="switchSection('R')">
    📖 Reading <span class="tab-count" id="tab-R-count">0/100</span>
  </button>
</div>
<div id="main-content"></div>
<div id="result-content" style="display:none"></div>
<script>
// ═══════════════════════════════════════════
// LISTENING — 100 questions (Test_01.mp3)
// ═══════════════════════════════════════════
var LISTENING = [
  {id:'L1',sec:'L',audio:'Test_01.mp3',grp:'Conversation 1 (Q1-5)',passage:'[Listen to a conversation between a student and a professor about a research paper deadline.]',text:'1. Why does the student visit the professor?',opts:['(A) To submit a completed paper\',\'(B) To request an extension on her assignment\',\'(C) To ask about the grading criteria\',\'(D) To get feedback on her draft'],ans:'(B) To request an extension on her assignment'},
  {id:'L2',sec:'L',audio:'Test_01.mp3',grp:'Conversation 1 (Q1-5)',passage:'[Listen to a conversation between a student and a professor about a research paper deadline.]',text:'2. What does the professor say about the deadline?',opts:['(A) It cannot be changed under any circumstances\',\'(B) A one-week extension is possible\',\'(C) The deadline was already extended once\',\'(D) Students must submit by midnight'],ans:'(B) A one-week extension is possible'},
  {id:'L3',sec:'L',audio:'Test_01.mp3',grp:'Conversation 1 (Q1-5)',passage:'[Listen to a conversation between a student and a professor about a research paper deadline.]',text:'3. What problem does the student mention?',opts:['(A) She lost her notes\',\'(B) Her computer broke down\',\'(C) She has been ill for several days\',\'(D) She misunderstood the assignment'],ans:'(C) She has been ill for several days'},
  {id:'L4',sec:'L',audio:'Test_01.mp3',grp:'Conversation 1 (Q1-5)',passage:'[Listen to a conversation between a student and a professor about a research paper deadline.]',text:'4. What does the professor ask the student to provide?',opts:['(A) A doctor\\'s note\',\'(B) A partial draft\',\'(C) An email confirmation\',\'(D) A revised outline'],ans:'(A) A doctor\'s note'},
  {id:'L5',sec:'L',audio:'Test_01.mp3',grp:'Conversation 1 (Q1-5)',passage:'[Listen to a conversation between a student and a professor about a research paper deadline.]',text:'5. What will the student most likely do next?',opts:['(A) Drop the course\',\'(B) Submit the paper immediately\',\'(C) Get documentation from the health center\',\'(D) Ask another professor for help'],ans:'(C) Get documentation from the health center'},
  {id:'L6',sec:'L',audio:'Test_01.mp3',grp:'Lecture 1 — Astronomy (Q6-11)',passage:'[Listen to part of a lecture in an astronomy class about the formation of stars.]',text:'6. What is the lecture mainly about?',opts:['(A) The life cycle of the Sun\',\'(B) How stars form from nebulae\',\'(C) The discovery of new galaxies\',\'(D) Black holes and their properties'],ans:'(B) How stars form from nebulae'},
  {id:'L7',sec:'L',audio:'Test_01.mp3',grp:'Lecture 1 — Astronomy (Q6-11)',passage:'[Listen to part of a lecture in an astronomy class about the formation of stars.]',text:'7. What is a nebula?',opts:['(A) A dying star\',\'(B) A type of galaxy\',\'(C) A cloud of gas and dust in space\',\'(D) A planet without an atmosphere'],ans:'(C) A cloud of gas and dust in space'},
  {id:'L8',sec:'L',audio:'Test_01.mp3',grp:'Lecture 1 — Astronomy (Q6-11)',passage:'[Listen to part of a lecture in an astronomy class about the formation of stars.]',text:'8. According to the professor, what triggers star formation?',opts:['(A) A nearby supernova explosion\',\'(B) Gravitational collapse of gas clouds\',\'(C) Collision between two galaxies\',\'(D) Solar wind from existing stars'],ans:'(B) Gravitational collapse of gas clouds'},
  {id:'L9',sec:'L',audio:'Test_01.mp3',grp:'Lecture 1 — Astronomy (Q6-11)',passage:'[Listen to part of a lecture in an astronomy class about the formation of stars.]',text:'9. What is a protostar?',opts:['(A) A star that has exploded\',\'(B) An early stage of star formation before nuclear fusion begins\',\'(C) A star with no planets\',\'(D) A star larger than the Sun'],ans:'(B) An early stage of star formation before nuclear fusion begins'},
  {id:'L10',sec:'L',audio:'Test_01.mp3',grp:'Lecture 1 — Astronomy (Q6-11)',passage:'[Listen to part of a lecture in an astronomy class about the formation of stars.]',text:'10. What determines the final size of a star?',opts:['(A) The temperature of the nebula\',\'(B) The distance from the galactic center\',\'(C) The amount of mass in the original gas cloud\',\'(D) The speed of rotation'],ans:'(C) The amount of mass in the original gas cloud'},
  {id:'L11',sec:'L',audio:'Test_01.mp3',grp:'Lecture 1 — Astronomy (Q6-11)',passage:'[Listen to part of a lecture in an astronomy class about the formation of stars.]',text:'11. What does the professor say about the Sun?',opts:['(A) It is unusually large for its type\',\'(B) It is a medium-sized star that formed from a nebula\',\'(C) It will become a black hole\',\'(D) It formed 10 billion years ago'],ans:'(B) It is a medium-sized star that formed from a nebula'},
  {id:'L12',sec:'L',audio:'Test_01.mp3',grp:'Conversation 2 (Q12-16)',passage:'[Listen to a conversation between two students planning a group presentation.]',text:'12. What are the students discussing?',opts:['(A) A lab experiment\',\'(B) A group presentation assignment\',\'(C) A study schedule for finals\',\'(D) A campus event they are organizing'],ans:'(B) A group presentation assignment'},
  {id:'L13',sec:'L',audio:'Test_01.mp3',grp:'Conversation 2 (Q12-16)',passage:'[Listen to a conversation between two students planning a group presentation.]',text:'13. What topic did they choose for the presentation?',opts:['(A) Climate change\',\'(B) Artificial intelligence in healthcare\',\'(C) The history of the internet\',\'(D) Renewable energy sources'],ans:'(B) Artificial intelligence in healthcare'},
  {id:'L14',sec:'L',audio:'Test_01.mp3',grp:'Conversation 2 (Q12-16)',passage:'[Listen to a conversation between two students planning a group presentation.]',text:'14. What does the man volunteer to do?',opts:['(A) Design the slides\',\'(B) Conduct the research\',\'(C) Present the introduction\',\'(D) Find a meeting room'],ans:'(A) Design the slides'},
  {id:'L15',sec:'L',audio:'Test_01.mp3',grp:'Conversation 2 (Q12-16)',passage:'[Listen to a conversation between two students planning a group presentation.]',text:'15. When do they plan to meet next?',opts:['(A) Tomorrow morning\',\'(B) This weekend\',\'(C) After Thursday\\'s class\',\'(D) Next Monday'],ans:'(C) After Thursday\'s class'},
  {id:'L16',sec:'L',audio:'Test_01.mp3',grp:'Conversation 2 (Q12-16)',passage:'[Listen to a conversation between two students planning a group presentation.]',text:'16. What concern does the woman express?',opts:['(A) The topic is too broad\',\'(B) They do not have enough time\',\'(C) One group member is unreliable\',\'(D) The professor dislikes their topic'],ans:'(A) The topic is too broad'},
  {id:'L17',sec:'L',audio:'Test_01.mp3',grp:'Lecture 2 — Economics (Q17-22)',passage:'[Listen to part of a lecture in an economics class about supply and demand.]',text:'17. What economic concept is the lecture about?',opts:['(A) Inflation and deflation\',\'(B) The law of supply and demand\',\'(C) International trade agreements\',\'(D) Government fiscal policy'],ans:'(B) The law of supply and demand'},
  {id:'L18',sec:'L',audio:'Test_01.mp3',grp:'Lecture 2 — Economics (Q17-22)',passage:'[Listen to part of a lecture in an economics class about supply and demand.]',text:'18. According to the professor, what happens when demand increases but supply stays the same?',opts:['(A) Prices fall\',\'(B) Prices rise\',\'(C) Supply automatically increases\',\'(D) The market collapses'],ans:'(B) Prices rise'},
  {id:'L19',sec:'L',audio:'Test_01.mp3',grp:'Lecture 2 — Economics (Q17-22)',passage:'[Listen to part of a lecture in an economics class about supply and demand.]',text:'19. What example does the professor use to illustrate the concept?',opts:['(A) The housing market\',\'(B) The price of gasoline\',\'(C) The stock market\',\'(D) Agricultural commodity prices'],ans:'(A) The housing market'},
  {id:'L20',sec:'L',audio:'Test_01.mp3',grp:'Lecture 2 — Economics (Q17-22)',passage:'[Listen to part of a lecture in an economics class about supply and demand.]',text:'20. What is the equilibrium price?',opts:['(A) The lowest price a seller will accept\',\'(B) The price set by the government\',\'(C) The price at which supply equals demand\',\'(D) The average price across all markets'],ans:'(C) The price at which supply equals demand'},
  {id:'L21',sec:'L',audio:'Test_01.mp3',grp:'Lecture 2 — Economics (Q17-22)',passage:'[Listen to part of a lecture in an economics class about supply and demand.]',text:'21. What does the professor say about price ceilings?',opts:['(A) They always benefit consumers\',\'(B) They can lead to shortages\',\'(C) They are rarely used in modern economies\',\'(D) They increase supply'],ans:'(B) They can lead to shortages'},
  {id:'L22',sec:'L',audio:'Test_01.mp3',grp:'Lecture 2 — Economics (Q17-22)',passage:'[Listen to part of a lecture in an economics class about supply and demand.]',text:'22. What assignment does the professor give for next class?',opts:['(A) Read chapter 4\',\'(B) Write a one-page analysis of a market\',\'(C) Find a news article about price changes\',\'(D) Complete a problem set'],ans:'(C) Find a news article about price changes'},
  {id:'L23',sec:'L',audio:'Test_01.mp3',grp:'Lecture 3 — Literature (Q23-28)',passage:'[Listen to part of a lecture in a literature class about symbolism in novels.]',text:'23. What literary device is the focus of the lecture?',opts:['(A) Metaphor\',\'(B) Foreshadowing\',\'(C) Symbolism\',\'(D) Irony'],ans:'(C) Symbolism'},
  {id:'L24',sec:'L',audio:'Test_01.mp3',grp:'Lecture 3 — Literature (Q23-28)',passage:'[Listen to part of a lecture in a literature class about symbolism in novels.]',text:'24. Which novel does the professor use as the main example?',opts:['(A) The Great Gatsby\',\'(B) To Kill a Mockingbird\',\'(C) 1984\',\'(D) The Catcher in the Rye'],ans:'(A) The Great Gatsby'},
  {id:'L25',sec:'L',audio:'Test_01.mp3',grp:'Lecture 3 — Literature (Q23-28)',passage:'[Listen to part of a lecture in a literature class about symbolism in novels.]',text:'25. What does the green light in the novel symbolize?',opts:['(A) Jealousy and envy\',\'(B) Hope and the American Dream\',\'(C) Wealth and materialism\',\'(D) Death and decay'],ans:'(B) Hope and the American Dream'},
  {id:'L26',sec:'L',audio:'Test_01.mp3',grp:'Lecture 3 — Literature (Q23-28)',passage:'[Listen to part of a lecture in a literature class about symbolism in novels.]',text:'26. According to the professor, why is symbolism important in literature?',opts:['(A) It makes stories longer\',\'(B) It allows authors to convey complex ideas indirectly\',\'(C) It replaces the need for character development\',\'(D) It is required by literary conventions'],ans:'(B) It allows authors to convey complex ideas indirectly'},
  {id:'L27',sec:'L',audio:'Test_01.mp3',grp:'Lecture 3 — Literature (Q23-28)',passage:'[Listen to part of a lecture in a literature class about symbolism in novels.]',text:'27. What does the professor say about the Valley of Ashes?',opts:['(A) It represents the beauty of industrial progress\',\'(B) It symbolizes the moral decay beneath the glamour of wealth\',\'(C) It is where the main character lives\',\'(D) It has no symbolic meaning'],ans:'(B) It symbolizes the moral decay beneath the glamour of wealth'},

  {id:'L34',sec:'L',audio:'Test_01.mp3',grp:'Lecture 4 — Environmental Science (Q34-39)',passage:'[Listen to part of a lecture in an environmental science class about deforestation.]',text:'34. What is the main topic of the lecture?',opts:['(A) The benefits of reforestation\',\'(B) Causes and effects of deforestation\',\'(C) Wildlife conservation programs\',\'(D) Climate change and ocean levels'],ans:'(B) Causes and effects of deforestation'},
  {id:'L35',sec:'L',audio:'Test_01.mp3',grp:'Lecture 4 — Environmental Science (Q34-39)',passage:'[Listen to part of a lecture in an environmental science class about deforestation.]',text:'35. According to the professor, what is the leading cause of deforestation?',opts:['(A) Urban expansion\',\'(B) Agricultural land clearing\',\'(C) Logging for timber\',\'(D) Natural disasters'],ans:'(B) Agricultural land clearing'},
  {id:'L36',sec:'L',audio:'Test_01.mp3',grp:'Lecture 4 — Environmental Science (Q34-39)',passage:'[Listen to part of a lecture in an environmental science class about deforestation.]',text:'36. What effect does deforestation have on the water cycle?',opts:['(A) It increases rainfall\',\'(B) It has no significant effect\',\'(C) It disrupts rainfall patterns and reduces water availability\',\'(D) It causes flooding in coastal areas'],ans:'(C) It disrupts rainfall patterns and reduces water availability'},
  {id:'L37',sec:'L',audio:'Test_01.mp3',grp:'Lecture 4 — Environmental Science (Q34-39)',passage:'[Listen to part of a lecture in an environmental science class about deforestation.]',text:'37. Which region does the professor focus on as an example?',opts:['(A) The Sahara Desert\',\'(B) The Amazon Rainforest\',\'(C) The Siberian Taiga\',\'(D) The Congo Basin'],ans:'(B) The Amazon Rainforest'},
  {id:'L38',sec:'L',audio:'Test_01.mp3',grp:'Lecture 4 — Environmental Science (Q34-39)',passage:'[Listen to part of a lecture in an environmental science class about deforestation.]',text:'38. What does the professor say about carbon storage in forests?',opts:['(A) Forests store very little carbon\',\'(B) Forests are the largest carbon sinks on land\',\'(C) Carbon storage only occurs in old-growth forests\',\'(D) Deforestation increases carbon storage'],ans:'(B) Forests are the largest carbon sinks on land'},

  {id:'L42',sec:'L',audio:'Test_01.mp3',grp:'Conversation 4 (Q40-44)',passage:'[Listen to a conversation between a student and a librarian about research databases.]',text:'42. What does the librarian explain about filtering search results?',opts:['(A) You can filter by publication date and subject area\',\'(B) Filters are only available for premium accounts\',\'(C) You must contact the librarian to apply filters\',\'(D) Filters only work for book searches'],ans:'(A) You can filter by publication date and subject area'},
  {id:'L43',sec:'L',audio:'Test_01.mp3',grp:'Conversation 4 (Q40-44)',passage:'[Listen to a conversation between a student and a librarian about research databases.]',text:'43. What does the student say about her previous search attempts?',opts:['(A) She found too many irrelevant results\',\'(B) She could not access the database\',\'(C) She found no results at all\',\'(D) She accidentally deleted her search history'],ans:'(A) She found too many irrelevant results'},

  {id:'L45',sec:'L',audio:'Test_01.mp3',grp:'Lecture 5 — Sociology (Q45-50)',passage:'[Listen to part of a lecture in a sociology class about social media and identity.]',text:'45. What is the main topic of the lecture?',opts:['(A) The history of social networking sites\',\'(B) How social media influences personal identity\',\'(C) The economic impact of social media companies\',\'(D) Privacy concerns in the digital age'],ans:'(B) How social media influences personal identity'},
  {id:'L46',sec:'L',audio:'Test_01.mp3',grp:'Lecture 5 — Sociology (Q45-50)',passage:'[Listen to part of a lecture in a sociology class about social media and identity.]',text:'46. According to the professor, what is "impression management"?',opts:['(A) Managing a company\\'s public image\',\'(B) The way people control how others perceive them\',\'(C) A technique used in advertising\',\'(D) A psychological disorder'],ans:'(B) The way people control how others perceive them'},
  {id:'L47',sec:'L',audio:'Test_01.mp3',grp:'Lecture 5 — Sociology (Q45-50)',passage:'[Listen to part of a lecture in a sociology class about social media and identity.]',text:'47. What does the professor say about online personas?',opts:['(A) They are always accurate representations of real identity\',\'(B) They often differ from a person\\'s offline self\',\'(C) They are only used by teenagers\',\'(D) They have no psychological impact'],ans:'(B) They often differ from a person\'s offline self'},
  {id:'L48',sec:'L',audio:'Test_01.mp3',grp:'Lecture 5 — Sociology (Q45-50)',passage:'[Listen to part of a lecture in a sociology class about social media and identity.]',text:'48. What research finding does the professor mention?',opts:['(A) Social media use decreases self-esteem in all users\',\'(B) Comparing oneself to others online can negatively affect well-being\',\'(C) Social media has no effect on mental health\',\'(D) Older adults are more affected than younger users'],ans:'(B) Comparing oneself to others online can negatively affect well-being'},
  {id:'L49',sec:'L',audio:'Test_01.mp3',grp:'Lecture 5 — Sociology (Q45-50)',passage:'[Listen to part of a lecture in a sociology class about social media and identity.]',text:'49. What positive aspect of social media does the professor acknowledge?',opts:['(A) It eliminates social anxiety\',\'(B) It can help people connect with communities that share their interests\',\'(C) It always improves academic performance\',\'(D) It reduces the need for face-to-face interaction'],ans:'(B) It can help people connect with communities that share their interests'},
  {id:'L50',sec:'L',audio:'Test_01.mp3',grp:'Lecture 5 — Sociology (Q45-50)',passage:'[Listen to part of a lecture in a sociology class about social media and identity.]',text:'50. What does the professor suggest students do for the next class?',opts:['(A) Delete their social media accounts for one week\',\'(B) Read a journal article on digital identity\',\'(C) Interview someone about their social media use\',\'(D) Write a reflection on their own online behavior'],ans:'(D) Write a reflection on their own online behavior'},
  {id:'L51',sec:'L',audio:'Test_01.mp3',grp:'Conversation 5 (Q51-55)',passage:'[Listen to a conversation between a student and a campus health center staff member.]',text:'51. Why does the student call the health center?',opts:['(A) To schedule a vaccination\',\'(B) To make an appointment for a check-up\',\'(C) To ask about health insurance coverage\',\'(D) To report a medical emergency'],ans:'(B) To make an appointment for a check-up'},

  {id:'L55',sec:'L',audio:'Test_01.mp3',grp:'Conversation 5 (Q51-55)',passage:'[Listen to a conversation between a student and a campus health center staff member.]',text:'55. What does the staff member say about the cost?',opts:['(A) It is free for all students\',\'(B) It depends on the type of visit\',\'(C) Students must pay upfront and get reimbursed\',\'(D) The cost is covered by the student activity fee'],ans:'(A) It is free for all students'},
  {id:'L56',sec:'L',audio:'Test_01.mp3',grp:'Lecture 6 — Art History (Q56-61)',passage:'[Listen to part of a lecture in an art history class about the Impressionist movement.]',text:'56. What art movement is the lecture about?',opts:['(A) Cubism\',\'(B) Surrealism\',\'(C) Impressionism\',\'(D) Abstract Expressionism'],ans:'(C) Impressionism'},

  {id:'L58',sec:'L',audio:'Test_01.mp3',grp:'Lecture 6 — Art History (Q56-61)',passage:'[Listen to part of a lecture in an art history class about the Impressionist movement.]',text:'58. What technique is characteristic of Impressionist painting?',opts:['(A) Precise, detailed brushwork\',\'(B) Loose brushstrokes to capture light and movement\',\'(C) Dark, heavy colors\',\'(D) Geometric shapes and patterns'],ans:'(B) Loose brushstrokes to capture light and movement'},
  {id:'L59',sec:'L',audio:'Test_01.mp3',grp:'Lecture 6 — Art History (Q56-61)',passage:'[Listen to part of a lecture in an art history class about the Impressionist movement.]',text:'59. Which artist does the professor mention as a key figure?',opts:['(A) Pablo Picasso\',\'(B) Claude Monet\',\'(C) Salvador Dali\',\'(D) Vincent van Gogh'],ans:'(B) Claude Monet'},
  {id:'L60',sec:'L',audio:'Test_01.mp3',grp:'Lecture 6 — Art History (Q56-61)',passage:'[Listen to part of a lecture in an art history class about the Impressionist movement.]',text:'60. How did critics initially react to Impressionist art?',opts:['(A) They praised it immediately\',\'(B) They were indifferent\',\'(C) They rejected and mocked it\',\'(D) They considered it too traditional'],ans:'(C) They rejected and mocked it'},
  {id:'L61',sec:'L',audio:'Test_01.mp3',grp:'Lecture 6 — Art History (Q56-61)',passage:'[Listen to part of a lecture in an art history class about the Impressionist movement.]',text:'61. What does the professor say about the name "Impressionism"?',opts:['(A) It was chosen by the artists themselves\',\'(B) It came from a critic\\'s mocking review of Monet\\'s painting\',\'(C) It was given by a museum curator\',\'(D) It refers to the emotional impact of the paintings'],ans:'(B) It came from a critic\'s mocking review of Monet\'s painting'},
  {id:'L62',sec:'L',audio:'Test_01.mp3',grp:'Conversation 6 (Q62-66)',passage:'[Listen to a conversation between a student and a professor about a failed experiment.]',text:'62. What is the student concerned about?',opts:['(A) His lab partner is not cooperating\',\'(B) His experiment did not produce the expected results\',\'(C) He broke expensive equipment\',\'(D) He missed the lab session'],ans:'(B) His experiment did not produce the expected results'},
  {id:'L63',sec:'L',audio:'Test_01.mp3',grp:'Conversation 6 (Q62-66)',passage:'[Listen to a conversation between a student and a professor about a failed experiment.]',text:'63. What does the professor say about unexpected results?',opts:['(A) They always indicate a mistake\',\'(B) They are a normal and valuable part of science\',\'(C) They should be hidden in the report\',\'(D) They mean the student must redo the experiment'],ans:'(B) They are a normal and valuable part of science'},

  {id:'L66',sec:'L',audio:'Test_01.mp3',grp:'Conversation 6 (Q62-66)',passage:'[Listen to a conversation between a student and a professor about a failed experiment.]',text:'66. How does the student feel at the end of the conversation?',opts:['(A) Still worried about his grade\',\'(B) Relieved and more confident about his report\',\'(C) Frustrated with the professor\\'s advice\',\'(D) Confused about what to write'],ans:'(B) Relieved and more confident about his report'},
  {id:'L67',sec:'L',audio:'Test_01.mp3',grp:'Lecture 7 — Anthropology (Q67-72)',passage:'[Listen to part of a lecture in an anthropology class about ancient trade routes.]',text:'67. What is the lecture mainly about?',opts:['(A) The fall of the Roman Empire\',\'(B) Ancient trade routes and cultural exchange\',\'(C) The development of writing systems\',\'(D) Early agricultural societies'],ans:'(B) Ancient trade routes and cultural exchange'},

  {id:'L69',sec:'L',audio:'Test_01.mp3',grp:'Lecture 7 — Anthropology (Q67-72)',passage:'[Listen to part of a lecture in an anthropology class about ancient trade routes.]',text:'69. What was traded along this route besides silk?',opts:['(A) Only luxury goods\',\'(B) Spices, glassware, and ideas\',\'(C) Primarily agricultural products\',\'(D) Weapons and military equipment'],ans:'(B) Spices, glassware, and ideas'},

  {id:'L71',sec:'L',audio:'Test_01.mp3',grp:'Lecture 7 — Anthropology (Q67-72)',passage:'[Listen to part of a lecture in an anthropology class about ancient trade routes.]',text:'71. What role did oasis cities play?',opts:['(A) They were military outposts\',\'(B) They served as rest stops and trading hubs\',\'(C) They were centers of religious worship only\',\'(D) They produced most of the traded goods'],ans:'(B) They served as rest stops and trading hubs'},

  var p72 = 'We are asking all Winnipeg staff to keep a copy of this schedule at their desks as a quick reference tool for scheduling interoffice meetings. Whenever possible, please schedule these meetings during one of the underlined hours, that is, after 7:00 A.M. but before 11 A.M.\n\nWinnipeg / Toulouse\n7:00 A.M. / 2:00 P.M.\n8:00 A.M. / 3:00 P.M.\n9:00 A.M. / 4:00 P.M.\n10:00 A.M. / 5:00 P.M.\n11:00 A.M. / 6:00 P.M.\n12:00 noon / 7:00 P.M.';

  var p74 = '[12:45 P.M.] Mina Evers: Hi, are you two still at the site? I need someone to send me the updated coordinates.\n[12:58 P.M.] Jina Lim: Yes, we are here. Chi has the device with the coordinates.\n[1:00 P.M.] Soo Chi: Sure thing, Mina. Sending them now.\n[1:02 P.M.] Mina Evers: Got them, thanks! I will start taking measurements from here.';
  var p75 = "This season's excellent weather has yielded a substantial harvest of fruits and vegetables, in many cases more than growers may find buyers for. Those of you wishing to donate surplus produce to community organizations can do so by visiting Vosey Farm and Garden's Web site (www.vfgrdn.org), where you will find our list of drop-off locations.\n\nIf you need us to come to you instead, please contact us. We will reach out to one of the many independent truck drivers who have kindly volunteered to transport and quickly distribute your food donations to vetted groups that need it. Check our Web site for more information about this service as well as for insights into topics related to farming and gardening in the Northern Great Plains region.";

  var p77 = "From: Masae Adachi <madachi@sweeterspecialties.com>\nTo: Camille Ayala <ayala@esplinelectronics.com>\nDate: February 12\nSubject: Event order\n\nDear Ms. Ayala,\n\nThank you for selecting our business to provide baked goods for the Esplin Electronics conference event in March. We are honored that you chose us for a fourth year in a row! On March 29, we will provide a large vanilla cake for each of the ten venues you indicated, and you will be billed within seven days. We will deliver a custom-baked multilayer cake on the following day. Please review the attached order form and return it to me.\n\nRegarding the cake you ordered for March 30, our head pastry chef will produce it according to your earlier specifications. In fact, he created a sample of the complete recipe today - almond creme cake with fresh raspberry filling. We have judged it to be a delectable treat, and we are sure that you will be pleased.\n\nIf you have any concerns, just send me an e-mail. As always, we value your business.\n\nMasae Adachi, Owner\nSweeter Specialties";
  var p78 = "Great Dishwasher!\n\nI never had a dishwasher before. After remodeling my kitchen, I finally had room for a compact dishwasher. I did a lot of research, and the Dish Magic 300 seemed to be the best choice. It was pricier than other models, but all of the reviews were excellent. So, I decided to spend the extra money. I have had the dishwasher for one month now, and I could not be happier with my decision. Most importantly, the dishes come out sparkling clean, no matter how dirty they were going in. Also, the machine is so quiet, you do not even know it is running. Lastly, it is designed to use water efficiently, which is very important to me. Overall, I am very pleased with this dishwasher.\n\n- Anna Yakovleva";

  {id:'R72',sec:'R',part:7,grp:'Part 7 — Questions 172-175 refer to the following online chat discussion.',passage:"Susan Gowan 9:16 A.M.: Good morning. The presentation slides about the new line of headphones are almost ready for distribution to our many partner stores. We are on track to send them out next Monday.\n\nMaggie Lorenz 9:17 A.M.: How do they look?\n\nSusan Gowan 9:20 A.M.: There are still some missing elements.\n\nAlan Woodson 9:21 A.M.: We mainly need the information from the user studies that reviewed the headphones for sport use. We should have that report from the research and development office by Wednesday.\n\nMaggie Lorenz 9:22 A.M.: Yes, let's not overlook that. And if you're concerned about the report not arriving by Wednesday, please contact Matt Harven and remind him to expedite a summary to us.\n\nSusan Gowan 9:23 A.M.: Assuming we receive that summary soon enough to incorporate its findings into the slides, should the three of us schedule a trial run through the presentation on Thursday or Friday?\n\nMaggie Lorenz 9:24 A.M.: Let's try for Thursday afternoon. Then we will still have Friday to make any necessary changes.\n\nAlan Woodson 9:25 A.M.: Fine by me. I'm free after 2 P.M.",text:'172. What is indicated about a presentation?',opts:['(A) It will be expensive to produce.\',\'(B) It will highlight some best-selling products.\',\'(C) It will be Ms. Gowan\\'s first project.\',\'(D) It will be sent to multiple locations.'],ans:'(D) It will be sent to multiple locations.'},

  {id:'R75',sec:'R',part:7,grp:'Part 7 — Questions 172-175 refer to the following online chat discussion.',passage:"Susan Gowan 9:16 A.M.: Good morning. The presentation slides about the new line of headphones are almost ready for distribution to our many partner stores. We are on track to send them out next Monday.\n\nMaggie Lorenz 9:17 A.M.: How do they look?\n\nSusan Gowan 9:20 A.M.: There are still some missing elements.\n\nAlan Woodson 9:21 A.M.: We mainly need the information from the user studies that reviewed the headphones for sport use. We should have that report from the research and development office by Wednesday.\n\nMaggie Lorenz 9:22 A.M.: Yes, let's not overlook that. And if you're concerned about the report not arriving by Wednesday, please contact Matt Harven and remind him to expedite a summary to us.\n\nSusan Gowan 9:23 A.M.: Assuming we receive that summary soon enough to incorporate its findings into the slides, should the three of us schedule a trial run through the presentation on Thursday or Friday?\n\nMaggie Lorenz 9:24 A.M.: Let's try for Thursday afternoon. Then we will still have Friday to make any necessary changes.\n\nAlan Woodson 9:25 A.M.: Fine by me. I'm free after 2 P.M.",text:'175. When do the writers plan to meet to review a slide presentation?',opts:['(A) On Monday\',\'(B) On Wednesday\',\'(C) On Thursday\',\'(D) On Friday'],ans:'(C) On Thursday'},
  {id:'R76',sec:'R',part:7,grp:'Part 7 — Questions 176-180 refer to the following press release and review.',passage:'FOR IMMEDIATE RELEASE
SYDNEY (4 June) - Kitchen Swifts and Chef Darius Cordero are joining together to give home cooks a new culinary experience. The award-winning chef is the owner of restaurants in both the Philippines and Australia, including the recently opened Enriqua\'s. He says his cooking reflects his Filipino heritage, which is a blend of many cultures.

"I\'ve designed these simplified recipes for Kitchen Swifts so that cooks at home can enjoy new and exciting flavours with ease," he said.

Zahra Chambers, vice president of Kitchen Swifts, says she is pleased to work with Chef Cordero and to offer delicious new recipes to their customers. Kitchen Swifts supplies menus, recipes, and ingredients for two people, four people, or six people, including a range of vegetarian selections. Customers choose the most appropriate meal options, and then a box is delivered weekly. Current customers will see no price increase with the partnership.

---
REVIEW: A colleague arranged for us to eat at Enriqua\'s while I was at a conference in Sydney. It is usually fully booked for dinner; you may need to call months in advance for a table. We had a wonderful lunch there instead. Everything was delicious, and the bread and desserts are baked on-site! It was a worthwhile treat before I flew back to Hong Kong.
- Meili Guan',text:'176. What is the purpose of the press release?',opts:['(A) To promote the opening of a restaurant\',\'(B) To announce a business partnership\',\'(C) To introduce a travel program\',\'(D) To congratulate an award recipient'],ans:'(B) To announce a business partnership'},

  {id:'R81',sec:'R',part:7,grp:'Part 7 — Questions 181-185 refer to the following e-mail and ticket.',passage:'E-MAIL
From: Conor Boyle
To: Laura Savard
Date: 25 May
Subject: RE: Some suggestions

Dear Ms. Savard,

Thank you for your kind offer to either pick up your online order from my shop or to pay extra for air or train transport. Neither arrangement is necessary, as I am happy to deliver your items to you in Stranraer myself. It so happens that my sister and her children live nearby in Kirkcolm. Before seeing them, I will drive my rental car to your house and hand deliver the items to you.

As you know, my merchandise is 100 percent handcrafted. If any damage occurs in transit, the repair turns into an expensive, time-consuming ordeal. Over the years, I\'ve seen too much damage done by inattentive baggage handlers. My policy is to deliver items personally whenever feasible or hire a ground- or sea-based courier service I trust.

I look forward to meeting you on 5 June. I expect to arrive at your house no later than 5 p.m.

Sincerely,
Conor Boyle, Ceoleire Classics

  {id:'R91',sec:'R',part:7,grp:'Part 7 — Questions 191-195 refer to the following article, review, and e-mail.',passage:'ARTICLE - Caribbean Flavours Abound by Rebecca Roats
NOTTINGHAM - Orange Bay Kitchen has been serving up an infusion of Jamaican flavours in a laid-back Caribbean atmosphere for six months now. Managed by Keron Deslandes, the 150-seat restaurant is an aromatic jewel amid the bustling shops and eateries in Wester Square. The restaurant is most famous for its jerk chicken. Marinated for 24 hours prior to grilling and served with sides of stewed cabbage and coconut rice, the dish is a good deal at 12 EUR. If you stop in on any Friday night between 7 and 11 P.M., you will enjoy live reggae music.

---
REVIEW (22 August) - Tamika Peterkin: Orange Bay Kitchen: 2/5 Stars
After reading a glowing article about Orange Bay Kitchen, I was eager to give this place a try. My husband and I arrived there at 7 P.M. yesterday, keen to enjoy live music with our dinner. Unfortunately, the band\'s performance that night had been cancelled. We stayed and both ordered the jerk chicken. While the chicken\'s smoky flavour was outstanding, the stewed cabbage was lacking in flavour. The head chef came out to apologise and was extremely nice, but we will probably not go back anytime soon.

---
E-MAIL (24 August) - From: Vea Smith, Owner, Orange Bay Kitchen
Dear Ms. Peterkin,
Thank you for visiting Orange Bay Kitchen and leaving a review. Our manager, Keron Deslandes, told me more about your visit. Please accept the attached 20 EUR gift certificate. During your visit, our band had an equipment malfunction. However, the band will be back performing weekly beginning in September. Also, Head Chef Adio Brown has changed the spices he uses in the stewed cabbage.
Sincerely, Vea Smith',text:'191. What does the article mention about Orange Bay Kitchen?',opts:['(A) It is currently hiring servers.\',\'(B) It is located on a quiet street.\',\'(C) It has another location in Jamaica.\',\'(D) It opened six months ago.'],ans:'(D) It opened six months ago.'},

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
var answers = {};
var currentSection = 'L';
var currentIdx = 0;
var submitted = false;
var sectionStarted = { L: false, R: false };
var TOTAL_SECONDS = 7200;
var secondsLeft = TOTAL_SECONDS;
var timerInterval = null;

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(function() {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timeup-overlay').style.display = 'flex';
    }
  }, 1000);
}

function updateTimerDisplay() {
  var h = Math.floor(secondsLeft / 3600);
  var m = Math.floor((secondsLeft % 3600) / 60);
  var s = secondsLeft % 60;
  var el = document.getElementById('timer');
  el.textContent = h + ':' + pad(m) + ':' + pad(s);
  el.className = 'timer' + (secondsLeft <= 600 ? ' danger' : secondsLeft <= 1800 ? ' warn' : '');
  document.getElementById('timer-progress').style.width = (secondsLeft / TOTAL_SECONDS * 100) + '%';
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function forceSubmit() {
  document.getElementById('timeup-overlay').style.display = 'none';
  submitted = true;
  showResult();
}

// ═══════════════════════════════════════════
// SECTION SWITCH
// ═══════════════════════════════════════════
function switchSection(sec) {
  currentSection = sec;
  currentIdx = 0;
  document.getElementById('tab-L').className = 'sec-tab' + (sec === 'L' ? ' active' : '');
  document.getElementById('tab-R').className = 'sec-tab' + (sec === 'R' ? ' active' : '');
  document.getElementById('section-badge').textContent = sec === 'L' ? 'Listening' : 'Reading';
  if (!sectionStarted[sec]) {
    showSectionIntro(sec);
  } else {
    renderQuestion();
  }
  updateTabCounts();
}

function showSectionIntro(sec) {
  var html = '';
  if (sec === 'L') {
    html = '<div class="main"><div class="section-intro">' +
      '<div style="font-size:52px;margin-bottom:12px">🎧</div>' +
      '<h2>Listening Section</h2>' +
      '<p>Listen to conversations and lectures, then answer questions. The audio player appears at the start of each group. You can replay audio at any time.</p>' +
      '<div class="intro-meta">' +
      '<div class="meta-pill">📝 100 Questions</div>' +
      '<div class="meta-pill">🎙️ 9 Groups</div>' +
      '<div class="meta-pill">⏱️ Part of 2-hour total</div>' +
      '</div>' +
      '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;font-size:13px;color:#92400e;margin-bottom:20px;text-align:left">' +
      '⚠️ <strong>Audio:</strong> Place <code>Test_01.mp3</code> in the same folder to enable playback.' +
      '</div>' +
      '<button class="start-btn" onclick="startSection(\'L\')">Start Listening →</button>' +
      '</div></div>';
  } else {
    html = '<div class="main"><div class="section-intro">' +
      '<div style="font-size:52px;margin-bottom:12px">📖</div>' +
      '<h2>Reading Section</h2>' +
      '<p>Read passages and answer comprehension questions. Scroll back to re-read the passage at any time. Questions are from real TOEIC Part 5, 6, and 7 material.</p>' +
      '<div class="intro-meta">' +
      '<div class="meta-pill">📝 100 Questions</div>' +
      '<div class="meta-pill">📄 Part 5 · 6 · 7</div>' +
      '<div class="meta-pill">⏱️ Part of 2-hour total</div>' +
      '</div>' +
      '<button class="start-btn" onclick="startSection(\'R\')">Start Reading →</button>' +
      '</div></div>';
  }
  document.getElementById('main-content').innerHTML = html;
}

function startSection(sec) {
  sectionStarted[sec] = true;
  startTimer();
  renderQuestion();
}

// ═══════════════════════════════════════════
// RENDER QUESTION
// ═══════════════════════════════════════════
function renderQuestion() {
  if (submitted) { showResult(); return; }
  var list = currentSection === 'L' ? LISTENING : READING;
  var q = list[currentIdx];
  var total = list.length;
  var answered = list.filter(function(x){ return answers[x.id] !== undefined; }).length;
  var globalNum = currentSection === 'L' ? currentIdx + 1 : LISTENING.length + currentIdx + 1;
  var pct = Math.round((currentIdx + 1) / total * 100);
  var isLast = currentIdx === total - 1;
  var isLastOverall = currentSection === 'R' && isLast;

  // Audio block — show at start of each group
  var audioHtml = '';
  if (currentSection === 'L') {
    var prevQ = currentIdx > 0 ? LISTENING[currentIdx - 1] : null;
    if (!prevQ || prevQ.grp !== q.grp) {
      audioHtml = '<div class="audio-block">' +
        '<div class="audio-label">🎧 ' + q.grp + '</div>' +
        '<div class="audio-player-row">' +
        '<button class="audio-play-btn" id="abtn" onclick="toggleAudio(\'' + q.audio + '\')">▶</button>' +
        '<div class="audio-progress" id="aprog" onclick="seekAudio(event)">' +
        '<div class="audio-progress-fill" id="aprogfill" style="width:0%"></div></div>' +
        '<span class="audio-time" id="atime">0:00 / 0:00</span>' +
        '</div>' +
        '<div class="audio-note">⚠️ Place <strong>Test_01.mp3</strong> in the same folder to enable audio.</div>' +
        '</div>';
    }
  }

  // Passage block
  var passageHtml = '';
  if (q.passage) {
    var prevQ2 = currentIdx > 0 ? list[currentIdx - 1] : null;
    var showPassage = !prevQ2 || prevQ2.grp !== q.grp || currentSection === 'R';
    if (showPassage) {
      passageHtml = '<div class="passage-block">' +
        '<div class="passage-title">' + q.grp + '</div>' +
        '<div class="passage-text">' + q.passage.replace(/\n/g, '<br>') + '</div>' +
        '</div>';
    }
  }

  // Part chip (Reading only)
  var partChip = '';
  if (currentSection === 'R') {
    var partLabel = q.part === 5 ? 'Part 5 — Incomplete Sentences' :
                    q.part === 6 ? 'Part 6 — Text Completion' :
                    'Part 7 — Reading Comprehension';
    partChip = '<div class="part-chip">' + partLabel + '</div>';
  }

  // Options
  var optsHtml = q.opts.map(function(opt) {
    var cls = 'opt';
    if (submitted) {
      if (opt === q.ans) cls = 'opt correct';
      else if (answers[q.id] === opt) cls = 'opt wrong';
    } else {
      if (answers[q.id] === opt) cls = 'opt selected';
    }
    var safeOpt = opt.replace(/'/g, "\'");
    return '<button class="' + cls + '" onclick="selectAnswer(\'' + q.id + '\',\'' + safeOpt + '\')">' + opt + '</button>';
  }).join('');

  // Nav
  var navHtml = '';
  if (isLastOverall && !submitted) {
    navHtml = '<button class="nav-btn" onclick="prevQ()" ' + (currentIdx === 0 ? 'disabled' : '') + '>← Prev</button>' +
              '<button class="nav-btn submit-all" onclick="submitAll()">✅ Submit All Answers</button>';
  } else if (isLast && currentSection === 'L') {
    navHtml = '<button class="nav-btn" onclick="prevQ()" ' + (currentIdx === 0 ? 'disabled' : '') + '>← Prev</button>' +
              '<button class="nav-btn go-reading" onclick="switchSection(\'R\')">Go to Reading →</button>';
  } else {
    var nextDisabled = (!answers[q.id] && !submitted) ? 'disabled' : '';
    navHtml = '<button class="nav-btn" onclick="prevQ()" ' + (currentIdx === 0 ? 'disabled' : '') + '>← Prev</button>' +
              '<button class="nav-btn next" onclick="nextQ()" ' + nextDisabled + '>Next →</button>';
  }

  // Dots
  var dotsHtml = list.map(function(qq, i) {
    var cls = 'dot-btn';
    if (i === currentIdx) cls += ' dot-active';
    if (submitted) cls += answers[qq.id] === qq.ans ? ' dot-correct' : ' dot-wrong';
    else if (answers[qq.id]) cls += ' dot-answered';
    return '<button class="' + cls + '" onclick="jumpTo(' + i + ')" title="Q' + globalNum + '"></button>';
  }).join('');

  var chipClass = currentSection === 'L' ? 'chip-listening' : 'chip-reading';
  var chipLabel = currentSection === 'L' ? '🎧 Listening' : '�� Reading';

  document.getElementById('main-content').innerHTML =
    '<div class="main">' +
    audioHtml +
    passageHtml +
    partChip +
    '<div class="q-header-row">' +
    '<span class="q-counter">Q' + globalNum + ' of 200</span>' +
    '<span class="q-section-chip ' + chipClass + '">' + chipLabel + '</span>' +
    '<span class="q-answered-info">' + answered + '/' + total + ' answered</span>' +
    '</div>' +
    '<div class="progress-strip"><div class="progress-strip-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="question-card"><p class="q-sentence">' + q.text + '</p><div class="opts">' + optsHtml + '</div></div>' +
    '<div class="nav-row">' + navHtml + '</div>' +
    '<div class="dots-nav">' + dotsHtml + '</div>' +
    '</div>';

  updateTabCounts();
}

// ═══════════════════════════════════════════
// ANSWER & NAVIGATION
// ═══════════════════════════════════════════
function selectAnswer(id, opt) {
  if (submitted) return;
  answers[id] = opt;
  // Update option styles
  var btns = document.querySelectorAll('.opts .opt');
  btns.forEach(function(b) {
    b.className = b.textContent.trim() === opt.trim() ? 'opt selected' : 'opt';
  });
  // Enable next button
  var nextBtn = document.querySelector('.nav-btn.next');
  if (nextBtn) nextBtn.disabled = false;
  updateTabCounts();
  // Auto-advance after 700ms
  var list = currentSection === 'L' ? LISTENING : READING;
  var isLast = currentIdx === list.length - 1;
  var isLastOverall = currentSection === 'R' && isLast;
  if (!isLastOverall && !isLast) {
    setTimeout(function() { nextQ(); }, 700);
  }
}

function nextQ() {
  var list = currentSection === 'L' ? LISTENING : READING;
  if (currentIdx < list.length - 1) {
    currentIdx++;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function jumpTo(i) {
  currentIdx = i;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateTabCounts() {
  var la = LISTENING.filter(function(q){ return answers[q.id] !== undefined; }).length;
  var ra = READING.filter(function(q){ return answers[q.id] !== undefined; }).length;
  document.getElementById('tab-L-count').textContent = la + '/100';
  document.getElementById('tab-R-count').textContent = ra + '/100';
  var tL = document.getElementById('tab-L');
  var tR = document.getElementById('tab-R');
  if (la === 100) tL.classList.add('done'); else tL.classList.remove('done');
  if (ra === 100) tR.classList.add('done'); else tR.classList.remove('done');
}

// ═══════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════
var currentAudio = null;
var currentAudioSrc = null;

function toggleAudio(src) {
  if (currentAudio && currentAudioSrc === src) {
    if (currentAudio.paused) { currentAudio.play(); setPlayBtn('⏸'); }
    else { currentAudio.pause(); setPlayBtn('▶'); }
    return;
  }
  if (currentAudio) currentAudio.pause();
  currentAudio = new Audio(src);
  currentAudioSrc = src;
  currentAudio.addEventListener('timeupdate', function() {
    var pct = currentAudio.duration ? (currentAudio.currentTime / currentAudio.duration * 100) : 0;
    var fill = document.getElementById('aprogfill');
    var timeEl = document.getElementById('atime');
    if (fill) fill.style.width = pct + '%';
    if (timeEl) timeEl.textContent = fmtTime(currentAudio.currentTime) + ' / ' + fmtTime(currentAudio.duration || 0);
  });
  currentAudio.addEventListener('ended', function() { setPlayBtn('▶'); });
  currentAudio.play();
  setPlayBtn('⏸');
}

function setPlayBtn(icon) {
  var btn = document.getElementById('abtn');
  if (btn) btn.textContent = icon;
}

function seekAudio(e) {
  if (!currentAudio) return;
  var bar = document.getElementById('aprog');
  if (!bar) return;
  var rect = bar.getBoundingClientRect();
  currentAudio.currentTime = ((e.clientX - rect.left) / rect.width) * currentAudio.duration;
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s / 60) + ':' + pad(Math.floor(s % 60));
}

// ═══════════════════════════════════════════
// SUBMIT & RESULT
// ═══════════════════════════════════════════
function submitAll() {
  if (currentAudio) currentAudio.pause();
  clearInterval(timerInterval);
  submitted = true;
  showResult();
}

function showResult() {
  document.getElementById('section-tabs').style.display = 'none';
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('result-content').style.display = 'block';

  var lScore = LISTENING.filter(function(q){ return answers[q.id] === q.ans; }).length;
  var rScore = READING.filter(function(q){ return answers[q.id] === q.ans; }).length;
  var total = lScore + rScore;
  var pct = Math.round(total / 200 * 100);

  // TOEIC-style score (5-495 per section, 10-990 total)
  // Each correct answer ≈ 4.9 points per section (100 questions → 495 max)
  var lToeic = Math.round(5 + (lScore / 100) * 490);
  var rToeic = Math.round(5 + (rScore / 100) * 490);
  var totalToeic = lToeic + rToeic;

  var timeUsed = TOTAL_SECONDS - secondsLeft;
  var timeStr = Math.floor(timeUsed/3600) + 'h ' + pad(Math.floor((timeUsed%3600)/60)) + 'm ' + pad(timeUsed%60) + 's';

  var emoji = pct >= 80 ? '🏆' : pct >= 60 ? '��' : pct >= 40 ? '📚' : '💪';
  var grade = pct >= 80 ? 'Excellent!' : pct >= 60 ? 'Good Job!' : pct >= 40 ? 'Keep Practicing!' : 'Keep Going!';

  // Score band description
  var band = '';
  if (totalToeic >= 860) band = 'Advanced — C1/C2 level. Highly proficient.';
  else if (totalToeic >= 730) band = 'Upper-Intermediate — B2 level. Good working proficiency.';
  else if (totalToeic >= 550) band = 'Intermediate — B1 level. Can handle routine tasks.';
  else if (totalToeic >= 350) band = 'Elementary — A2 level. Basic communication ability.';
  else band = 'Beginner — A1 level. Needs significant improvement.';

  var reviewHtml = LISTENING.concat(READING).map(function(q, i) {
    var correct = answers[q.id] === q.ans;
    var secCls = q.sec === 'L' ? 'r-sec-l' : 'r-sec-r';
    var num = q.sec === 'L' ? (i + 1) : (i - LISTENING.length + 101);
    return '<div class="review-item ' + (correct ? 'r-correct' : 'r-wrong') + '">' +
      '<span class="r-num">Q' + num + '</span>' +
      '<span class="r-sec ' + secCls + '">' + q.sec + '</span>' +
      '<span class="r-your">Your: ' + (answers[q.id] || '—') + '</span>' +
      '<span class="r-ans">' + (correct ? '✓' : '✗') + ' ' + q.ans + '</span>' +
      '</div>';
  }).join('');

  document.getElementById('result-content').innerHTML =
    '<div class="result-wrap"><div class="result-card">' +
    '<div class="result-emoji">' + emoji + '</div>' +
    '<div class="result-title">' + grade + '</div>' +
    '<div class="result-sub">' + total + '/200 correct (' + pct + '%) · Time used: ' + timeStr + '</div>' +
    '<div class="score-grid">' +
    '<div class="score-box sb-total"><div class="sn">' + totalToeic + '</div><div class="sl">TOEIC Score<br>/990</div></div>' +
    '<div class="score-box sb-listen"><div class="sn">' + lToeic + '</div><div class="sl">Listening<br>/495</div></div>' +
    '<div class="score-box sb-read"><div class="sn">' + rToeic + '</div><div class="sl">Reading<br>/495</div></div>' +
    '</div>' +
    '<div class="score-note">' +
    '<strong>📊 Score Prediction:</strong><br>' +
    '• Listening: ' + lScore + '/100 correct → ~' + lToeic + '/495<br>' +
    '• Reading: ' + rScore + '/100 correct → ~' + rToeic + '/495<br>' +
    '• Total: ~' + totalToeic + '/990<br>' +
    '• Level: <strong>' + band + '</strong><br><br>' +
    '<em>Note: This is a simulation for practice. Actual TOEIC scores may vary.</em>' +
    '</div>' +
    '<div class="review-list">' + reviewHtml + '</div>' +
    '<button class="retry-btn" onclick="restartTest()">🔄 Try Again</button>' +
    '</div></div>';
}

function restartTest() {
  answers = {};
  currentSection = 'L';
  currentIdx = 0;
  submitted = false;
  sectionStarted = { L: false, R: false };
  secondsLeft = TOTAL_SECONDS;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  updateTimerDisplay();
  document.getElementById('section-tabs').style.display = 'flex';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('result-content').style.display = 'none';
  document.getElementById('tab-L').className = 'sec-tab active';
  document.getElementById('tab-R').className = 'sec-tab';
  document.getElementById('section-badge').textContent = 'Listening';
  updateTabCounts();
  showSectionIntro('L');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
updateTimerDisplay();
updateTabCounts();
showSectionIntro('L');

</script>
