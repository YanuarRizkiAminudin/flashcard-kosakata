<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC Test 06 — Vocabulary Flashcard</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#eef2f7;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 12px 40px;}
#app{width:100%;max-width:480px;}
h1{font-family:'Lora',serif;font-size:16px;color:#1a1814;text-align:center;margin-bottom:3px;}
.sub{font-size:12px;color:#8a8478;text-align:center;margin-bottom:12px;}
.filters{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
.fb{padding:5px 11px;border-radius:99px;border:1px solid #e8e4dc;background:#fff;color:#8a8478;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.fb:hover{border-color:#2d7a4f;color:#2d7a4f;}
.fb.on{background:#2d7a4f;color:#fff;border-color:#2d7a4f;}
.fb.all-btn.on{background:#1a1814;border-color:#1a1814;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;}
.badge{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;padding:3px 10px;border-radius:99px;background:#e8e4dc;color:#8a8478;}
.ctr{font-size:13px;color:#8a8478;}
.pbar-bg{height:4px;background:#e8e4dc;border-radius:99px;margin-bottom:.4rem;}
.pbar{height:4px;background:linear-gradient(90deg,#2d7a4f,#52c48a);border-radius:99px;transition:width .4s;}
.plabels{display:flex;justify-content:space-between;font-size:11px;color:#8a8478;margin-bottom:.8rem;}
.pills{display:flex;gap:6px;margin-bottom:.9rem;}
.pill{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 4px;border-radius:99px;border:1px solid;font-size:12px;font-weight:500;}
.pl-p{background:#edf7f1;border-color:#a8d9bc;color:#2d7a4f;}
.pl-h{background:#fef3e2;border-color:#f5c97a;color:#a05c00;}
.pl-b{background:#fdf0f0;border-color:#f5a8a8;color:#b83232;}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.dp{background:#2d7a4f;}.dh{background:#a05c00;}.db{background:#b83232;}
.card{background:#fff;border:1px solid #e8e4dc;border-radius:20px;box-shadow:0 2px 14px rgba(0,0,0,.07);min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.8rem 1.2rem;margin-bottom:.8rem;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f5c97a,#52c48a,#85b7eb);opacity:.6;}
.card:hover:not(.done){transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.1);}
.ctag{font-size:10px;font-weight:600;letter-spacing:.8px;padding:3px 9px;border-radius:99px;background:#e8e4dc;color:#8a8478;margin-bottom:.7rem;}
.word{font-family:'Lora',serif;font-weight:700;color:#1a1814;line-height:1.2;text-align:center;}
.word.big{font-size:44px;}.word.med{font-size:34px;}.word.sm{font-size:26px;}.word.xs{font-size:20px;}.word.xxs{font-size:15px;}
.hint{font-size:13px;color:#8a8478;margin-top:.8rem;display:flex;align-items:center;gap:6px;}
.hint-ico{width:26px;height:26px;border-radius:50%;border:1px solid #e8e4dc;display:flex;align-items:center;justify-content:center;font-size:12px;}
.ans{margin-top:.8rem;text-align:center;animation:fup .25s ease;width:100%;}
@keyframes fup{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.divline{width:36px;height:1px;background:#e8e4dc;margin:0 auto .6rem;}
.pos{font-size:11px;font-weight:600;color:#8a8478;margin-bottom:4px;}
.meaning{font-size:17px;font-weight:600;color:#2d7a4f;margin-bottom:4px;}
.id-txt{font-size:13px;color:#8a8478;line-height:1.5;}
.ex-txt{font-size:11px;color:#5a7a6a;font-style:italic;margin-top:7px;line-height:1.6;border-left:2px solid #a8d9bc;padding-left:8px;text-align:left;width:100%;}
.syns{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:8px;}
.syn{font-size:11px;background:#edf7f1;border:1px solid #a8d9bc;color:#2d7a4f;border-radius:99px;padding:3px 10px;font-weight:500;}
.btnrow{display:flex;gap:7px;margin-bottom:.7rem;}
.cb{flex:1;padding:10px 5px;border-radius:13px;border:1.5px solid;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .14s;}
.cb-ico{font-size:16px;}.cb-sub{font-size:9px;font-weight:500;opacity:.7;}
.cb-p{background:#edf7f1;border-color:#a8d9bc;color:#2d7a4f;}.cb-p:hover{background:#d5f0e2;}
.cb-h{background:#fef3e2;border-color:#f5c97a;color:#a05c00;}.cb-h:hover{background:#fde8c2;}
.cb-b{background:#fdf0f0;border-color:#f5a8a8;color:#b83232;}.cb-b:hover{background:#f9d8d8;}
.res{text-align:center;padding:.8rem 0;}
.res-ico{font-size:50px;margin-bottom:.7rem;}
.res-title{font-family:'Lora',serif;font-size:18px;font-weight:700;color:#1a1814;margin-bottom:.3rem;}
.res-sub{font-size:13px;color:#8a8478;margin-bottom:1rem;line-height:1.6;}
.srow{display:flex;gap:7px;margin-bottom:1rem;}
.sbox{flex:1;padding:10px 5px;border-radius:13px;border:1px solid;text-align:center;}
.sbox .sn{font-size:21px;font-weight:700;}.sbox .sl{font-size:10px;margin-top:2px;}
.sbp{background:#edf7f1;border-color:#a8d9bc;color:#2d7a4f;}
.sbh{background:#fef3e2;border-color:#f5c97a;color:#a05c00;}
.sbb{background:#fdf0f0;border-color:#f5a8a8;color:#b83232;}
.rlist-wrap{text-align:left;margin-bottom:1rem;}
.rlist-ttl{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#8a8478;margin-bottom:6px;}
.rlist{border:1px solid #e8e4dc;border-radius:13px;overflow:hidden;max-height:200px;overflow-y:auto;}
.ri{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #e8e4dc;background:#fff;}
.ri:last-child{border-bottom:none;}
.ri-word{font-family:'Lora',serif;font-size:14px;font-weight:700;color:#1a1814;min-width:100px;}
.ri-pos{font-size:10px;color:#8a8478;}
.ri-id{font-size:11px;color:#2d7a4f;margin-left:auto;text-align:right;max-width:160px;}
.btnbig{width:100%;padding:13px;border-radius:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-bottom:8px;border:none;}
.btn-green{background:linear-gradient(135deg,#2d7a4f,#3da866);color:#fff;box-shadow:0 3px 10px rgba(45,122,79,.25);}
.btn-green:hover{opacity:.9;}
.btn-ghost{background:transparent;border:1.5px solid #e8e4dc !important;color:#8a8478;}
.btn-ghost:hover{background:#e8e4dc;}
.final{text-align:center;padding:2rem 0;}

.tr-txt{font-size:15px;font-weight:700;color:#1a5276;margin-bottom:3px;}
.ety-txt{font-size:11px;color:#7d6608;background:#fef9e7;border:1px solid #f9e79f;border-radius:8px;padding:6px 10px;margin-top:7px;line-height:1.5;text-align:left;width:100%;}
.wf-wrap{margin-top:8px;width:100%;text-align:left;}
.wf-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#8a8478;margin-bottom:5px;}
.wf-grid{display:flex;flex-wrap:wrap;gap:5px;}
.wf-item{font-size:11px;background:#eaf4fb;border:1px solid #aed6f1;color:#1a5276;border-radius:8px;padding:3px 9px;font-weight:500;}
.wf-item span{color:#8a8478;font-weight:400;margin-left:3px;}

.quiz-wrap{margin-top:10px;width:100%;text-align:left;}
.quiz-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#8a8478;margin-bottom:5px;}
.quiz-q{font-size:13px;color:#374151;line-height:1.7;background:#f8f9fa;border-radius:8px;padding:8px 12px;border-left:3px solid #4f46e5;}
.quiz-blank{display:inline-block;min-width:80px;border-bottom:2px solid #4f46e5;color:#4f46e5;font-weight:700;font-style:normal;}
</style>
</head>
<body>
<div id="app">
  <h1>TOEIC Test 06 — Vocabulary</h1>
  <div class="sub" id="tsub">All categories</div>
  <div class="filters">
    <button class="fb all-btn on" onclick="setCat('ALL')">All</button>
    <button class="fb" onclick="setCat('VERB')">Verbs</button>
    <button class="fb" onclick="setCat('NOUN')">Nouns</button>
    <button class="fb" onclick="setCat('ADJ')">Adjectives</button>
    <button class="fb" onclick="setCat('ADV')">Adverbs</button>
    <button class="fb" onclick="setCat('PHRASE')">Phrases</button>
  </div>
  <div id="qv">
    <div class="topbar"><span class="badge" id="rb">Round 1</span><span class="ctr" id="ctr">1/--</span></div>
    <div class="pbar-bg"><div class="pbar" id="pb" style="width:0%"></div></div>
    <div class="plabels"><span id="pl">0 done</span><span id="pr">-- cards</span></div>
    <div class="pills">
      <div class="pill pl-p"><span class="dot dp"></span>&nbsp;<span id="sp">0</span>&nbsp;Got it</div>
      <div class="pill pl-h"><span class="dot dh"></span>&nbsp;<span id="sh">0</span>&nbsp;Almost</div>
      <div class="pill pl-b"><span class="dot db"></span>&nbsp;<span id="sb">0</span>&nbsp;Review</div>
    </div>
    <div class="card" id="card" onclick="reveal()">
      <div class="ctag" id="ctag"></div>
      <div class="word" id="word"></div>
      <div class="hint" id="hint"><div class="hint-ico">&#128070;</div>Tap to see answer</div>
      <div class="ans" id="ans" style="display:none">
        <div class="divline"></div>
        <div class="pos" id="pos"></div>
        <div class="tr-txt" id="tr" style="display:none"></div>
        <div class="meaning" id="meaning"></div>
        <div class="id-txt" id="idt"></div>
        <div class="ex-txt" id="ext" style="display:none"></div>
        <div class="syns" id="syns"></div>
        <div class="ety-txt" id="ety" style="display:none"></div>
        <div class="wf-wrap" id="wf" style="display:none"></div>
        <div class="quiz-wrap" id="quiz" style="display:none"></div>
      </div>
    </div>
    <div class="btnrow" id="ba" style="display:none">
      <button class="cb cb-b" onclick="rate('b')"><span class="cb-ico">&#128533;</span><span>Review</span><span class="cb-sub">Show again</span></button>
      <button class="cb cb-h" onclick="rate('h')"><span class="cb-ico">&#129300;</span><span>Almost</span><span class="cb-sub">Show again</span></button>
      <button class="cb cb-p" onclick="rate('p')"><span class="cb-ico">&#10003;</span><span>Got it</span><span class="cb-sub">Remove card</span></button>
    </div>
  </div>
  <div id="rv" style="display:none">
    <div class="res">
      <div class="res-ico" id="ri"></div>
      <div class="res-title" id="rt"></div>
      <div class="res-sub" id="rs"></div>
      <div class="srow">
        <div class="sbox sbp"><div class="sn" id="rp">0</div><div class="sl">Got it</div></div>
        <div class="sbox sbh"><div class="sn" id="rh">0</div><div class="sl">Almost</div></div>
        <div class="sbox sbb"><div class="sn" id="rbb">0</div><div class="sl">Review</div></div>
      </div>
      <div id="rlw" style="display:none">
        <div class="rlist-wrap">
          <div class="rlist-ttl">Cards for next round</div>
          <div class="rlist" id="rl"></div>
        </div>
      </div>
      <button class="btnbig btn-green" id="nb" onclick="nextRonde()"></button>
      <button class="btnbig btn-ghost" onclick="fullRestart()">Start over</button>
    </div>
  </div>
  <div id="fv" style="display:none">
    <div class="final">
      <div style="font-size:60px;margin-bottom:.8rem">&#127942;</div>
      <div class="res-title">All mastered!</div>
      <div style="font-size:13px;color:#8a8478;margin:.5rem 0 1.3rem;">Your TOEIC Test 06 vocab is ready!</div>
      <button class="btnbig btn-green" onclick="fullRestart()">Restart</button>
    </div>
  </div>
</div>
<script>
var V=[
  {"w": "authorize", "pos": "verb", "cat": "VERB", "m": "to officially approve", "tr": "mengizinkan secara resmi", "i": "to give official permission for something", "e": "Only the manager is authorized to approve expense reports.", "s": ["approve", "permit", "sanction"], "wf": [{"w": "authorization", "p": "noun"}, {"w": "authorized", "p": "adj"}, {"w": "authority", "p": "noun"}], "ety": "Dari bahasa Latin 'auctorizare' (memberi wewenang), dari kata 'auctor' (pencetus). Masuk ke bahasa Inggris melalui bahasa Prancis Kuno pada abad ke-14.", "q": "Only the director is ___ to sign financial documents."},
  {"w": "consolidate", "pos": "verb", "cat": "VERB", "m": "to combine into one", "tr": "menggabungkan menjadi satu", "i": "to merge separate things into a single stronger unit", "e": "The company plans to consolidate its two offices into one location.", "s": ["merge", "combine", "unify"], "wf": [{"w": "consolidation", "p": "noun"}, {"w": "consolidated", "p": "adj"}], "ety": "Dari bahasa Latin 'consolidare' (membuat padat), dari 'con-' (bersama) + 'solidus' (padat). Digunakan dalam bahasa Inggris sejak abad ke-16.", "q": "The firm decided to ___ its three regional branches into one headquarters."},
  {"w": "retain", "pos": "verb", "cat": "VERB", "m": "to keep or maintain", "tr": "mempertahankan", "i": "to continue to have something; not to lose it", "e": "The company has managed to retain its top employees for over a decade.", "s": ["keep", "maintain", "preserve"], "wf": [{"w": "retention", "p": "noun"}, {"w": "retentive", "p": "adj"}], "ety": "Dari bahasa Latin 'retinere' (menahan kembali), dari 're-' (kembali) + 'tenere' (memegang). Masuk ke bahasa Inggris pada abad ke-15.", "q": "The company offered higher salaries to ___ its best engineers."},
  {"w": "revise", "pos": "verb", "cat": "VERB", "m": "to update or correct", "tr": "merevisi / memperbaiki", "i": "to make changes to improve or correct something", "e": "Please revise the proposal before submitting it to the client.", "s": ["update", "amend", "edit"], "wf": [{"w": "revision", "p": "noun"}, {"w": "revised", "p": "adj"}], "ety": "Dari bahasa Latin 'revisere' (melihat kembali), dari 're-' (lagi) + 'videre' (melihat). Masuk ke bahasa Inggris pada abad ke-17.", "q": "The editor asked the writer to ___ the draft before publication."},
  {"w": "notify", "pos": "verb", "cat": "VERB", "m": "to inform officially", "tr": "memberitahukan secara resmi", "i": "to formally tell someone about something", "e": "Please notify the HR department of any changes to your personal information.", "s": ["inform", "alert", "advise"], "wf": [{"w": "notification", "p": "noun"}, {"w": "notice", "p": "noun"}], "ety": "Dari bahasa Latin 'notificare' (membuat diketahui), dari 'notus' (diketahui) + 'facere' (membuat). Digunakan dalam bahasa Inggris sejak abad ke-15.", "q": "Please ___ us immediately if you are unable to attend the meeting."},
  {"w": "finalize", "pos": "verb", "cat": "VERB", "m": "to complete the last details", "tr": "menyelesaikan tahap akhir", "i": "to put the finishing touches on something", "e": "We need to finalize the contract before the end of the week.", "s": ["complete", "conclude", "settle"], "wf": [{"w": "final", "p": "adj"}, {"w": "finalization", "p": "noun"}, {"w": "finally", "p": "adv"}], "ety": "Dari bahasa Latin 'finalis' (tentang akhir), dari 'finis' (akhir). Bentuk kata kerja menjadi umum dalam bahasa Inggris Amerika pada abad ke-20.", "q": "We need to ___ the budget report before the board meeting tomorrow."},
  {"w": "outsource", "pos": "verb", "cat": "VERB", "m": "to hire externally", "tr": "mengalihdayakan", "i": "to arrange for work to be done by an outside company", "e": "The firm decided to outsource its IT support to a specialist company.", "s": ["subcontract", "delegate", "farm out"], "wf": [{"w": "outsourcing", "p": "noun"}, {"w": "outsourced", "p": "adj"}], "ety": "Gabungan kata 'out' + 'source'. Muncul dalam bahasa bisnis Amerika pada tahun 1980-an ketika perusahaan mulai mengontrakkan pekerjaan ke pihak eksternal.", "q": "Many companies choose to ___ their customer service to reduce costs."},
  {"w": "streamline", "pos": "verb", "cat": "VERB", "m": "to make more efficient", "tr": "menyederhanakan proses", "i": "to simplify a process to make it faster and more effective", "e": "The new software will streamline the invoicing process.", "s": ["simplify", "optimize", "improve"], "wf": [{"w": "streamlined", "p": "adj"}, {"w": "streamlining", "p": "noun"}], "ety": "Awalnya istilah fisika (1860-an) untuk aliran fluida yang mulus. Diterapkan pada proses bisnis di abad ke-20 untuk berarti membuat operasi lebih efisien.", "q": "The new system will ___ the approval process from five steps to two."},
  {"w": "reimburse", "pos": "verb", "cat": "VERB", "m": "to pay back expenses", "tr": "mengganti biaya", "i": "to repay someone for money they have spent", "e": "Submit your receipts and we will reimburse you within five business days.", "s": ["repay", "refund", "compensate"], "wf": [{"w": "reimbursement", "p": "noun"}], "ety": "Dari bahasa Prancis 'rembourser', dari 're-' (kembali) + 'embourser' (memasukkan ke dompet). Masuk ke bahasa Inggris pada abad ke-17.", "q": "Keep all your receipts and the company will ___ your travel expenses."},
  {"w": "launch", "pos": "verb", "cat": "VERB", "m": "to introduce publicly", "tr": "meluncurkan", "i": "to start or introduce a new product, service, or campaign", "e": "The company will launch its new product line next quarter.", "s": ["introduce", "release", "unveil"], "wf": [{"w": "launch", "p": "noun"}, {"w": "launcher", "p": "noun"}], "ety": "Dari bahasa Prancis Kuno 'lanchier' (melempar tombak). Awalnya berarti melempar; berkembang menjadi memulai sesuatu yang baru pada abad ke-17.", "q": "The tech company plans to ___ its new smartphone model next month."},
  {"w": "negotiate", "pos": "verb", "cat": "VERB", "m": "to discuss to reach agreement", "tr": "bernegosiasi", "i": "to have formal discussions to reach a mutually acceptable outcome", "e": "Both parties agreed to negotiate the terms of the contract.", "s": ["discuss", "bargain", "mediate"], "wf": [{"w": "negotiation", "p": "noun"}, {"w": "negotiator", "p": "noun"}, {"w": "negotiable", "p": "adj"}], "ety": "Dari bahasa Latin 'negotiari' (menjalankan bisnis), dari 'negotium' (bisnis), dari 'nec' (tidak) + 'otium' (waktu luang). Masuk ke bahasa Inggris pada abad ke-16.", "q": "The union and management will ___ a new salary agreement next week."},
  {"w": "monitor", "pos": "verb", "cat": "VERB", "m": "to watch and check", "tr": "memantau", "i": "to regularly observe and check the progress of something", "e": "The supervisor will monitor employee performance on a monthly basis.", "s": ["track", "oversee", "observe"], "wf": [{"w": "monitoring", "p": "noun"}, {"w": "monitor", "p": "noun"}], "ety": "Dari bahasa Latin 'monitor' (orang yang memperingatkan), dari 'monere' (memperingatkan). Makna memantau/memeriksa berkembang pada abad ke-20.", "q": "The IT team will ___ the network for any unusual activity."},
  {"w": "allocate", "pos": "verb", "cat": "VERB", "m": "to assign resources", "tr": "mengalokasikan", "i": "to distribute resources or duties for a specific purpose", "e": "The budget was allocated equally among all departments.", "s": ["assign", "distribute", "designate"], "wf": [{"w": "allocation", "p": "noun"}, {"w": "allocated", "p": "adj"}], "ety": "Dari bahasa Latin Abad Pertengahan 'allocare' (menempatkan), dari 'ad-' (ke) + 'locare' (menempatkan). Masuk ke bahasa Inggris pada abad ke-17.", "q": "The manager decided to ___ more resources to the marketing department."},
  {"w": "comply", "pos": "verb", "cat": "VERB", "m": "to follow rules", "tr": "mematuhi", "i": "to act in accordance with rules, regulations, or requests", "e": "All staff must comply with the new workplace safety guidelines.", "s": ["obey", "adhere to", "conform to"], "wf": [{"w": "compliance", "p": "noun"}, {"w": "compliant", "p": "adj"}], "ety": "Dari bahasa Italia 'complire' (memenuhi), dari bahasa Latin 'complere' (mengisi penuh). Masuk ke bahasa Inggris pada abad ke-17.", "q": "All employees must ___ with the company's code of conduct."},

var LABELS={VERB:"Verb",NOUN:"Noun",ADJ:"Adjective",ADV:"Adverb",PHRASE:"Phrase",ALL:"All"};
function sh(a){return a.slice().sort(function(){return Math.random()-.5;});}
var deck,idx,ronde,cp,ch,cbv,rev,toRev,curCat="ALL";

function setCat(c){
  curCat=c;
  document.querySelectorAll(".fb").forEach(function(b){b.classList.remove("on");});
  document.querySelectorAll(".fb").forEach(function(b){
    if(b.getAttribute("onclick")==="setCat('"+c+"')") b.classList.add("on");
  });
  ronde=1; fullRestart();
}

function fullRestart(){
  var src=curCat==="ALL"?V:V.filter(function(v){return v.cat===curCat;});
  deck=sh(src);
  var total=deck.length;
  document.getElementById("tsub").textContent=
    (curCat==="ALL"?"All categories — "+total+" words":LABELS[curCat]+" — "+total+" words");
  go();
}

function go(){
  idx=0;cp=0;ch=0;cbv=0;rev=false;toRev=[];
  show("qv");hide("rv");hide("fv");
  document.getElementById("rb").textContent="Round "+ronde;
  upStats();showCard();
}

function nextRonde(){ronde++;deck=sh(toRev);go();}

function showCard(){
  rev=false;
  var q=deck[idx];
  var el=document.getElementById("word");
  el.textContent=q.w;
  var l=q.w.length;
  el.className="word "+(l<=6?"big":l<=10?"med":l<=16?"sm":l<=24?"xs":"xxs");
  document.getElementById("ctag").textContent=LABELS[q.cat]||q.cat;
  document.getElementById("pos").textContent=q.pos;
  var trEl=document.getElementById("tr");
  if(q.tr){trEl.textContent="🇮🇩 "+q.tr;trEl.style.display="block";}else{trEl.style.display="none";}
  document.getElementById("meaning").textContent=q.m;
  document.getElementById("idt").textContent=q.i;
  var extEl=document.getElementById("ext");
  if(q.e){extEl.textContent='"'+q.e+'"';extEl.style.display="block";}
  else{extEl.style.display="none";}
  var synsEl=document.getElementById("syns");
  synsEl.innerHTML="";
  if(q.s){q.s.forEach(function(s){
    var span=document.createElement("span");
    span.className="syn";span.textContent=s;
    synsEl.appendChild(span);
  });}
  var etyEl=document.getElementById("ety");
  if(q.ety){etyEl.textContent="📜 "+q.ety;etyEl.style.display="block";}else{etyEl.style.display="none";}
  var wfEl=document.getElementById("wf");
  if(q.wf&&q.wf.length){
    var wfHtml='<div class="wf-label">Word Family</div><div class="wf-grid">';
    q.wf.forEach(function(f){wfHtml+='<div class="wf-item">'+f.w+'<span>('+f.p+')</span></div>';});
    wfHtml+='</div>';
    wfEl.innerHTML=wfHtml;wfEl.style.display="block";
  }else{wfEl.style.display="none";}
  var quizEl=document.getElementById("quiz");
  if(q.q){
    var qHtml='<div class="quiz-label">\u2753 Fill in the blank</div><div class="quiz-q">'+q.q.replace(/___/g,'<span class="quiz-blank">'+q.w+'</span>')+'</div>';
    quizEl.innerHTML=qHtml;quizEl.style.display="block";
  }else{quizEl.style.display="none";}
  document.getElementById("ans").style.display="none";
  document.getElementById("hint").style.display="flex";
  document.getElementById("ba").style.display="none";
  document.getElementById("card").className="card";
  document.getElementById("ctr").textContent=(idx+1)+"/"+deck.length;
  var pct=Math.round(idx/deck.length*100);
  document.getElementById("pb").style.width=pct+"%";
  document.getElementById("pl").textContent=idx+" done";
  document.getElementById("pr").textContent=deck.length+" cards";
}

function reveal(){
  if(rev)return;rev=true;
  document.getElementById("ans").style.display="block";
  document.getElementById("hint").style.display="none";
  document.getElementById("ba").style.display="flex";
  document.getElementById("card").className="card done";
}

function rate(r){
  var q=deck[idx];
  if(r==="p") cp++;
  else if(r==="h"){ch++;toRev.push(q);}
  else{cbv++;toRev.push(q);}
  upStats();idx++;
  if(idx>=deck.length){showResult();return;}
  showCard();
}

function upStats(){
  document.getElementById("sp").textContent=cp;
  document.getElementById("sh").textContent=ch;
  document.getElementById("sb").textContent=cbv;
}

function showResult(){
  document.getElementById("pb").style.width="100%";
  hide("qv");
  if(toRev.length===0){show("fv");return;}
  show("rv");
  document.getElementById("rp").textContent=cp;
  document.getElementById("rh").textContent=ch;
  document.getElementById("rbb").textContent=cbv;
  var pct=Math.round(cp/deck.length*100);
  document.getElementById("ri").textContent=pct>=90?"&#127775;":pct>=70?"&#128522;":pct>=50?"&#128170;":"&#128548;";
  document.getElementById("rt").textContent="Round "+ronde+" complete!";
  document.getElementById("rs").textContent=
    pct>=90?"Almost perfect! "+toRev.length+" cards left.":
    pct>=70?"Great job! "+toRev.length+" cards to review.":
    pct>=50?"Good effort! Review "+toRev.length+" cards.":
    "Keep going! "+toRev.length+" cards waiting.";
  document.getElementById("nb").textContent="Round "+(ronde+1)+" → "+toRev.length+" cards";
  var rl=document.getElementById("rl");
  rl.innerHTML="";
  toRev.forEach(function(v){
    var d=document.createElement("div");d.className="ri";
    d.innerHTML="<span class='ri-word'>"+v.w+"</span><div><div class='ri-pos'>"+v.pos+"</div></div><span class='ri-id'>"+v.m+"</span>";
    rl.appendChild(d);
  });
  document.getElementById("rlw").style.display="";
}

function show(id){document.getElementById(id).style.display="";}
function hide(id){document.getElementById(id).style.display="none";}

setCat("ALL");
</script>
