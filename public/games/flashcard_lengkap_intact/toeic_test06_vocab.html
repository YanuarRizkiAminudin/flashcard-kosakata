<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC Test 06 — Vocabulary Flashcard</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#eef2f7;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 12px 40px;}
#app{width:100%;max-width:480px;}
h1{font-family:'Lora',serif;font-size:16px;color:#1a1814;text-align:center;margin-bottom:3px;}
.sub{font-size:12px;color:#8a8478;text-align:center;margin-bottom:12px;}
.filters{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
.fb{padding:5px 11px;border-radius:99px;border:1px solid #e8e4dc;background:#fff;color:#8a8478;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.fb:hover{border-color:#2d7a4f;color:#2d7a4f;}
.fb.on{background:#2d7a4f;color:#fff;border-color:#2d7a4f;}
.fb.all-btn.on{background:#1a1814;border-color:#1a1814;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;}
.badge{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;padding:3px 10px;border-radius:99px;background:#e8e4dc;color:#8a8478;}
.ctr{font-size:13px;color:#8a8478;}
.pbar-bg{height:4px;background:#e8e4dc;border-radius:99px;margin-bottom:.4rem;}
.pbar{height:4px;background:linear-gradient(90deg,#2d7a4f,#52c48a);border-radius:99px;transition:width .4s;}
.plabels{display:flex;justify-content:space-between;font-size:11px;color:#8a8478;margin-bottom:.8rem;}
.pills{display:flex;gap:6px;margin-bottom:.9rem;}
.pill{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 4px;border-radius:99px;border:1px solid;font-size:12px;font-weight:500;}
.pl-p{background:#edf7f1;border-color:#a8d9bc;color:#2d7a4f;}
.pl-h{background:#fef3e2;border-color:#f5c97a;color:#a05c00;}
.pl-b{background:#fdf0f0;border-color:#f5a8a8;color:#b83232;}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.dp{background:#2d7a4f;}.dh{background:#a05c00;}.db{background:#b83232;}
.card{background:#fff;border:1px solid #e8e4dc;border-radius:20px;box-shadow:0 2px 14px rgba(0,0,0,.07);min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.8rem 1.2rem;margin-bottom:.8rem;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f5c97a,#52c48a,#85b7eb);opacity:.6;}
.card:hover:not(.done){transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.1);}
.ctag{font-size:10px;font-weight:600;letter-spacing:.8px;padding:3px 9px;border-radius:99px;background:#e8e4dc;color:#8a8478;margin-bottom:.7rem;}
.word{font-family:'Lora',serif;font-weight:700;color:#1a1814;line-height:1.2;text-align:center;}
.word.big{font-size:44px;}.word.med{font-size:34px;}.word.sm{font-size:26px;}.word.xs{font-size:20px;}.word.xxs{font-size:15px;}
.hint{font-size:13px;color:#8a8478;margin-top:.8rem;display:flex;align-items:center;gap:6px;}
.hint-ico{width:26px;height:26px;border-radius:50%;border:1px solid #e8e4dc;display:flex;align-items:center;justify-content:center;font-size:12px;}
.ans{margin-top:.8rem;text-align:center;animation:fup .25s ease;width:100%;}
@keyframes fup{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.divline{width:36px;height:1px;background:#e8e4dc;margin:0 auto .6rem;}
.pos{font-size:11px;font-weight:600;color:#8a8478;margin-bottom:4px;}
.meaning{font-size:17px;font-weight:600;color:#2d7a4f;margin-bottom:4px;}
.id-txt{font-size:13px;color:#8a8478;line-height:1.5;}
.ex-txt{font-size:11px;color:#5a7a6a;font-style:italic;margin-top:7px;line-height:1.6;border-left:2px solid #a8d9bc;padding-left:8px;text-align:left;width:100%;}
.syns{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:8px;}
.syn{font-size:11px;background:#edf7f1;border:1px solid #a8d9bc;color:#2d7a4f;border-radius:99px;padding:3px 10px;font-weight:500;}
.btnrow{display:flex;gap:7px;margin-bottom:.7rem;}
.cb{flex:1;padding:10px 5px;border-radius:13px;border:1.5px solid;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .14s;}
.cb-ico{font-size:16px;}.cb-sub{font-size:9px;font-weight:500;opacity:.7;}
.cb-p{background:#edf7f1;border-color:#a8d9bc;color:#2d7a4f;}.cb-p:hover{background:#d5f0e2;}
.cb-h{background:#fef3e2;border-color:#f5c97a;color:#a05c00;}.cb-h:hover{background:#fde8c2;}
.cb-b{background:#fdf0f0;border-color:#f5a8a8;color:#b83232;}.cb-b:hover{background:#f9d8d8;}
.res{text-align:center;padding:.8rem 0;}
.res-ico{font-size:50px;margin-bottom:.7rem;}
.res-title{font-family:'Lora',serif;font-size:18px;font-weight:700;color:#1a1814;margin-bottom:.3rem;}
.res-sub{font-size:13px;color:#8a8478;margin-bottom:1rem;line-height:1.6;}
.srow{display:flex;gap:7px;margin-bottom:1rem;}
.sbox{flex:1;padding:10px 5px;border-radius:13px;border:1px solid;text-align:center;}
.sbox .sn{font-size:21px;font-weight:700;}.sbox .sl{font-size:10px;margin-top:2px;}
.sbp{background:#edf7f1;border-color:#a8d9bc;color:#2d7a4f;}
.sbh{background:#fef3e2;border-color:#f5c97a;color:#a05c00;}
.sbb{background:#fdf0f0;border-color:#f5a8a8;color:#b83232;}
.rlist-wrap{text-align:left;margin-bottom:1rem;}
.rlist-ttl{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#8a8478;margin-bottom:6px;}
.rlist{border:1px solid #e8e4dc;border-radius:13px;overflow:hidden;max-height:200px;overflow-y:auto;}
.ri{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #e8e4dc;background:#fff;}
.ri:last-child{border-bottom:none;}
.ri-word{font-family:'Lora',serif;font-size:14px;font-weight:700;color:#1a1814;min-width:100px;}
.ri-pos{font-size:10px;color:#8a8478;}
.ri-id{font-size:11px;color:#2d7a4f;margin-left:auto;text-align:right;max-width:160px;}
.btnbig{width:100%;padding:13px;border-radius:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-bottom:8px;border:none;}
.btn-green{background:linear-gradient(135deg,#2d7a4f,#3da866);color:#fff;box-shadow:0 3px 10px rgba(45,122,79,.25);}
.btn-green:hover{opacity:.9;}
.btn-ghost{background:transparent;border:1.5px solid #e8e4dc !important;color:#8a8478;}
.btn-ghost:hover{background:#e8e4dc;}
.final{text-align:center;padding:2rem 0;}
</style>
</head>
<body>
<div id="app">
  <h1>TOEIC Test 06 — Vocabulary</h1>
  <div class="sub" id="tsub">All categories</div>
  <div class="filters">
    <button class="fb all-btn on" onclick="setCat('ALL')">All</button>
    <button class="fb" onclick="setCat('VERB')">Verbs</button>
    <button class="fb" onclick="setCat('NOUN')">Nouns</button>
    <button class="fb" onclick="setCat('ADJ')">Adjectives</button>
    <button class="fb" onclick="setCat('ADV')">Adverbs</button>
    <button class="fb" onclick="setCat('PHRASE')">Phrases</button>
  </div>
  <div id="qv">
    <div class="topbar"><span class="badge" id="rb">Round 1</span><span class="ctr" id="ctr">1/--</span></div>
    <div class="pbar-bg"><div class="pbar" id="pb" style="width:0%"></div></div>
    <div class="plabels"><span id="pl">0 done</span><span id="pr">-- cards</span></div>
    <div class="pills">
      <div class="pill pl-p"><span class="dot dp"></span>&nbsp;<span id="sp">0</span>&nbsp;Got it</div>
      <div class="pill pl-h"><span class="dot dh"></span>&nbsp;<span id="sh">0</span>&nbsp;Almost</div>
      <div class="pill pl-b"><span class="dot db"></span>&nbsp;<span id="sb">0</span>&nbsp;Review</div>
    </div>
    <div class="card" id="card" onclick="reveal()">
      <div class="ctag" id="ctag"></div>
      <div class="word" id="word"></div>
      <div class="hint" id="hint"><div class="hint-ico">&#128070;</div>Tap to see answer</div>
      <div class="ans" id="ans" style="display:none">
        <div class="divline"></div>
        <div class="pos" id="pos"></div>
        <div class="meaning" id="meaning"></div>
        <div class="id-txt" id="idt"></div>
        <div class="ex-txt" id="ext" style="display:none"></div>
        <div class="syns" id="syns"></div>
      </div>
    </div>
    <div class="btnrow" id="ba" style="display:none">
      <button class="cb cb-b" onclick="rate('b')"><span class="cb-ico">&#128533;</span><span>Review</span><span class="cb-sub">Show again</span></button>
      <button class="cb cb-h" onclick="rate('h')"><span class="cb-ico">&#129300;</span><span>Almost</span><span class="cb-sub">Show again</span></button>
      <button class="cb cb-p" onclick="rate('p')"><span class="cb-ico">&#10003;</span><span>Got it</span><span class="cb-sub">Remove card</span></button>
    </div>
  </div>
  <div id="rv" style="display:none">
    <div class="res">
      <div class="res-ico" id="ri"></div>
      <div class="res-title" id="rt"></div>
      <div class="res-sub" id="rs"></div>
      <div class="srow">
        <div class="sbox sbp"><div class="sn" id="rp">0</div><div class="sl">Got it</div></div>
        <div class="sbox sbh"><div class="sn" id="rh">0</div><div class="sl">Almost</div></div>
        <div class="sbox sbb"><div class="sn" id="rbb">0</div><div class="sl">Review</div></div>
      </div>
      <div id="rlw" style="display:none">
        <div class="rlist-wrap">
          <div class="rlist-ttl">Cards for next round</div>
          <div class="rlist" id="rl"></div>
        </div>
      </div>
      <button class="btnbig btn-green" id="nb" onclick="nextRonde()"></button>
      <button class="btnbig btn-ghost" onclick="fullRestart()">Start over</button>
    </div>
  </div>
  <div id="fv" style="display:none">
    <div class="final">
      <div style="font-size:60px;margin-bottom:.8rem">&#127942;</div>
      <div class="res-title">All mastered!</div>
      <div style="font-size:13px;color:#8a8478;margin:.5rem 0 1.3rem;">Your TOEIC Test 06 vocab is ready!</div>
      <button class="btnbig btn-green" onclick="fullRestart()">Restart</button>
    </div>
  </div>
</div>
<script>
var V=[
// ── VERBS ──
{w:"authorize",pos:"verb",cat:"VERB",m:"to officially approve",i:"to give official permission for something",e:"Only the manager is authorized to approve expense reports.",s:["approve","permit","sanction"]},
{w:"consolidate",pos:"verb",cat:"VERB",m:"to combine into one",i:"to merge separate things into a single stronger unit",e:"The company plans to consolidate its two offices into one location.",s:["merge","combine","unify"]},
{w:"retain",pos:"verb",cat:"VERB",m:"to keep or maintain",i:"to continue to have something; not to lose it",e:"The company has managed to retain its top employees for over a decade.",s:["keep","maintain","preserve"]},
{w:"revise",pos:"verb",cat:"VERB",m:"to update or correct",i:"to make changes to improve or correct something",e:"Please revise the proposal before submitting it to the client.",s:["update","amend","edit"]},
{w:"notify",pos:"verb",cat:"VERB",m:"to inform officially",i:"to formally tell someone about something",e:"Please notify the HR department of any changes to your personal information.",s:["inform","alert","advise"]},
{w:"finalize",pos:"verb",cat:"VERB",m:"to complete the last details",i:"to put the finishing touches on something",e:"We need to finalize the contract before the end of the week.",s:["complete","conclude","settle"]},
{w:"outsource",pos:"verb",cat:"VERB",m:"to hire externally",i:"to arrange for work to be done by an outside company",e:"The firm decided to outsource its IT support to a specialist company.",s:["subcontract","delegate","farm out"]},
{w:"streamline",pos:"verb",cat:"VERB",m:"to make more efficient",i:"to simplify a process to make it faster and more effective",e:"The new software will streamline the invoicing process.",s:["simplify","optimize","improve"]},
{w:"reimburse",pos:"verb",cat:"VERB",m:"to pay back expenses",i:"to repay someone for money they have spent",e:"Submit your receipts and we will reimburse you within five business days.",s:["repay","refund","compensate"]},
{w:"launch",pos:"verb",cat:"VERB",m:"to introduce publicly",i:"to start or introduce a new product, service, or campaign",e:"The company will launch its new product line next quarter.",s:["introduce","release","unveil"]},
{w:"negotiate",pos:"verb",cat:"VERB",m:"to discuss to reach agreement",i:"to have formal discussions to reach a mutually acceptable outcome",e:"Both parties agreed to negotiate the terms of the contract.",s:["discuss","bargain","mediate"]},
{w:"monitor",pos:"verb",cat:"VERB",m:"to watch and check",i:"to regularly observe and check the progress of something",e:"The supervisor will monitor employee performance on a monthly basis.",s:["track","oversee","observe"]},
{w:"allocate",pos:"verb",cat:"VERB",m:"to assign resources",i:"to distribute resources or duties for a specific purpose",e:"The budget was allocated equally among all departments.",s:["assign","distribute","designate"]},
{w:"comply",pos:"verb",cat:"VERB",m:"to follow rules",i:"to act in accordance with rules, regulations, or requests",e:"All staff must comply with the new workplace safety guidelines.",s:["obey","adhere to","conform to"]},
{w:"submit",pos:"verb",cat:"VERB",m:"to hand in formally",i:"to present a document or application for consideration",e:"Please submit your application before the deadline.",s:["hand in","present","file"]},
{w:"coordinate",pos:"verb",cat:"VERB",m:"to organize jointly",i:"to organize people or activities so they work together effectively",e:"She was asked to coordinate the annual sales conference.",s:["organize","manage","arrange"]},
{w:"evaluate",pos:"verb",cat:"VERB",m:"to assess carefully",i:"to judge or calculate the quality or value of something",e:"The committee will evaluate all proposals by Friday.",s:["assess","review","appraise"]},
{w:"implement",pos:"verb",cat:"VERB",m:"to put into action",i:"to put a plan or decision into effect",e:"The new policy will be implemented starting next month.",s:["execute","apply","carry out"]},
{w:"verify",pos:"verb",cat:"VERB",m:"to confirm accuracy",i:"to make sure that something is true or correct",e:"Please verify your contact details before submitting the form.",s:["confirm","validate","check"]},
{w:"expedite",pos:"verb",cat:"VERB",m:"to speed up",i:"to make a process happen more quickly",e:"We need to expedite the shipment to meet the client deadline.",s:["accelerate","rush","fast-track"]},
{w:"postpone",pos:"verb",cat:"VERB",m:"to delay to a later time",i:"to arrange for something to happen at a later time than planned",e:"The board meeting has been postponed until further notice.",s:["delay","defer","reschedule"]},
{w:"acquire",pos:"verb",cat:"VERB",m:"to obtain or buy",i:"to gain possession of something, especially through effort or purchase",e:"The company acquired a smaller competitor last year.",s:["obtain","purchase","gain"]},
{w:"distribute",pos:"verb",cat:"VERB",m:"to hand out or deliver",i:"to give or deliver something to a number of people",e:"The marketing team will distribute flyers at the trade show.",s:["deliver","hand out","circulate"]},
{w:"renovate",pos:"verb",cat:"VERB",m:"to repair and improve",i:"to repair and improve a building or room",e:"The office will be renovated over the summer break.",s:["refurbish","restore","remodel"]},
{w:"register",pos:"verb",cat:"VERB",m:"to sign up officially",i:"to put your name on an official list",e:"You must register for the seminar at least two weeks in advance.",s:["sign up","enroll","record"]},
{w:"facilitate",pos:"verb",cat:"VERB",m:"to make easier",i:"to make a process or action easier or more achievable",e:"The new platform will facilitate communication between teams.",s:["enable","support","assist"]},
{w:"highlight",pos:"verb",cat:"VERB",m:"to draw attention to",i:"to emphasize something as important",e:"The report highlights the need for better data security.",s:["emphasize","feature","showcase"]},
{w:"generate",pos:"verb",cat:"VERB",m:"to produce or create",i:"to cause something to exist or occur",e:"The campaign generated significant interest from potential investors.",s:["produce","create","yield"]},
{w:"enhance",pos:"verb",cat:"VERB",m:"to improve quality",i:"to increase or improve the quality, value, or extent of something",e:"The upgrade will enhance the performance of the entire system.",s:["improve","boost","strengthen"]},
{w:"anticipate",pos:"verb",cat:"VERB",m:"to expect in advance",i:"to expect or predict something before it happens",e:"We anticipate strong demand for the new product.",s:["expect","foresee","predict"]},
{w:"accommodate",pos:"verb",cat:"VERB",m:"to provide space or adjust",i:"to provide room for, or to adjust to meet needs",e:"The conference hall can accommodate up to 500 guests.",s:["house","hold","cater for"]},
{w:"demonstrate",pos:"verb",cat:"VERB",m:"to show clearly",i:"to show or prove something clearly",e:"The results demonstrate the effectiveness of the new approach.",s:["show","prove","illustrate"]},
{w:"collaborate",pos:"verb",cat:"VERB",m:"to work together",i:"to work jointly with others on a project",e:"The two departments will collaborate on the new marketing campaign.",s:["cooperate","partner","team up"]},
{w:"investigate",pos:"verb",cat:"VERB",m:"to examine thoroughly",i:"to carry out a systematic inquiry into something",e:"The auditors were asked to investigate the financial discrepancy.",s:["examine","probe","look into"]},
{w:"propose",pos:"verb",cat:"VERB",m:"to suggest formally",i:"to put forward a plan or idea for consideration",e:"The manager proposed a new approach to customer service.",s:["suggest","recommend","put forward"]},
// ── NOUNS ──
{w:"agenda",pos:"noun",cat:"NOUN",m:"list of meeting topics",i:"a list of items to be discussed at a meeting",e:"Please review the agenda before the meeting starts.",s:["schedule","plan","itinerary"]},
{w:"amendment",pos:"noun",cat:"NOUN",m:"a formal change",i:"a change or addition made to a document or law",e:"The board approved an amendment to the original contract.",s:["revision","modification","change"]},
{w:"audit",pos:"noun",cat:"NOUN",m:"official financial check",i:"an official examination of financial accounts",e:"The annual audit revealed no significant irregularities.",s:["inspection","review","examination"]},
{w:"benchmark",pos:"noun",cat:"NOUN",m:"a standard for comparison",i:"a standard or point of reference used for comparison",e:"The company uses industry benchmarks to measure its performance.",s:["standard","reference","criterion"]},
{w:"budget",pos:"noun",cat:"NOUN",m:"financial plan",i:"an estimate of income and expenditure for a set period",e:"The marketing budget for next year has been increased by 15 percent.",s:["allocation","funds","financial plan"]},
{w:"candidate",pos:"noun",cat:"NOUN",m:"a person applying for a job",i:"a person who applies for a job or is nominated for a position",e:"We received over 200 applications from qualified candidates.",s:["applicant","nominee","contender"]},
{w:"capacity",pos:"noun",cat:"NOUN",m:"maximum amount possible",i:"the maximum amount that something can contain or produce",e:"The factory is currently operating at full capacity.",s:["volume","limit","output"]},
{w:"certificate",pos:"noun",cat:"NOUN",m:"official document of achievement",i:"an official document proving a fact or qualification",e:"Participants will receive a certificate upon completion of the course.",s:["credential","diploma","document"]},
{w:"circulation",pos:"noun",cat:"NOUN",m:"distribution or movement",i:"the movement of something from place to place",e:"The memo was put into circulation among all department heads.",s:["distribution","spread","flow"]},
{w:"clause",pos:"noun",cat:"NOUN",m:"a section of a contract",i:"a specific section or condition in a legal document",e:"Please read the termination clause carefully before signing.",s:["provision","condition","section"]},
{w:"commission",pos:"noun",cat:"NOUN",m:"a fee for completing a sale",i:"a payment made to someone for selling goods or services",e:"Sales representatives earn a 10 percent commission on each deal.",s:["fee","percentage","bonus"]},
{w:"compliance",pos:"noun",cat:"NOUN",m:"following rules",i:"the act of obeying rules, regulations, or standards",e:"All employees must complete the annual compliance training.",s:["adherence","conformity","observance"]},
{w:"confidentiality",pos:"noun",cat:"NOUN",m:"keeping information private",i:"the state of keeping information secret",e:"All staff must sign a confidentiality agreement before starting.",s:["privacy","secrecy","discretion"]},
{w:"contractor",pos:"noun",cat:"NOUN",m:"an independent worker",i:"a person or company hired to do specific work under a contract",e:"We hired an outside contractor to handle the renovation.",s:["subcontractor","freelancer","vendor"]},
{w:"correspondence",pos:"noun",cat:"NOUN",m:"written communication",i:"letters or emails exchanged between people",e:"Please keep all correspondence related to the project on file.",s:["communication","letters","emails"]},
{w:"deficit",pos:"noun",cat:"NOUN",m:"a shortfall in funds",i:"the amount by which something falls short of what is needed",e:"The company reported a budget deficit for the third quarter.",s:["shortfall","loss","gap"]},
{w:"delegation",pos:"noun",cat:"NOUN",m:"assigning tasks to others",i:"the act of giving authority or tasks to someone else",e:"Effective delegation is a key management skill.",s:["assignment","transfer","handover"]},
{w:"endorsement",pos:"noun",cat:"NOUN",m:"official support or approval",i:"a public statement of support or approval",e:"The product received an endorsement from a well-known athlete.",s:["approval","backing","support"]},
{w:"expenditure",pos:"noun",cat:"NOUN",m:"money spent",i:"the total amount of money spent",e:"The company needs to reduce its expenditure on travel.",s:["spending","expense","outlay"]},
{w:"forecast",pos:"noun",cat:"NOUN",m:"a prediction of future events",i:"a statement about what is likely to happen in the future",e:"The sales forecast for next year looks very promising.",s:["prediction","projection","estimate"]},
{w:"franchise",pos:"noun",cat:"NOUN",m:"a licensed business model",i:"a license to operate a business using another company brand",e:"She opened a franchise of the popular coffee chain.",s:["license","branch","outlet"]},
{w:"grievance",pos:"noun",cat:"NOUN",m:"a formal complaint",i:"an official complaint about unfair treatment",e:"Employees can submit a grievance through the HR portal.",s:["complaint","objection","dispute"]},
{w:"headquarters",pos:"noun",cat:"NOUN",m:"main office location",i:"the main office or center of operations of an organization",e:"The company headquarters is located in downtown Chicago.",s:["head office","main office","base"]},
{w:"incentive",pos:"noun",cat:"NOUN",m:"a reward to motivate action",i:"something that motivates or encourages someone to do something",e:"The company offers financial incentives for meeting sales targets.",s:["reward","motivation","bonus"]},
{w:"inventory",pos:"noun",cat:"NOUN",m:"a list of stock",i:"a complete list of items in stock",e:"The warehouse team conducts a full inventory check every quarter.",s:["stock","supply","stockpile"]},
{w:"invoice",pos:"noun",cat:"NOUN",m:"a bill for goods or services",i:"a document requesting payment for goods or services provided",e:"Please send the invoice to the accounts payable department.",s:["bill","statement","receipt"]},

var LABELS={VERB:"Verb",NOUN:"Noun",ADJ:"Adjective",ADV:"Adverb",PHRASE:"Phrase",ALL:"All"};
function sh(a){return a.slice().sort(function(){return Math.random()-.5;});}
var deck,idx,ronde,cp,ch,cbv,rev,toRev,curCat="ALL";

function setCat(c){
  curCat=c;
  document.querySelectorAll(".fb").forEach(function(b){b.classList.remove("on");});
  document.querySelectorAll(".fb").forEach(function(b){
    if(b.getAttribute("onclick")==="setCat('"+c+"')") b.classList.add("on");
  });
  ronde=1; fullRestart();
}

function fullRestart(){
  var src=curCat==="ALL"?V:V.filter(function(v){return v.cat===curCat;});
  deck=sh(src);
  var total=deck.length;
  document.getElementById("tsub").textContent=
    (curCat==="ALL"?"All categories — "+total+" words":LABELS[curCat]+" — "+total+" words");
  go();
}

function go(){
  idx=0;cp=0;ch=0;cbv=0;rev=false;toRev=[];
  show("qv");hide("rv");hide("fv");
  document.getElementById("rb").textContent="Round "+ronde;
  upStats();showCard();
}

function nextRonde(){ronde++;deck=sh(toRev);go();}

function showCard(){
  rev=false;
  var q=deck[idx];
  var el=document.getElementById("word");
  el.textContent=q.w;
  var l=q.w.length;
  el.className="word "+(l<=6?"big":l<=10?"med":l<=16?"sm":l<=24?"xs":"xxs");
  document.getElementById("ctag").textContent=LABELS[q.cat]||q.cat;
  document.getElementById("pos").textContent=q.pos;
  document.getElementById("meaning").textContent=q.m;
  document.getElementById("idt").textContent=q.i;
  var extEl=document.getElementById("ext");
  if(q.e){extEl.textContent='"'+q.e+'"';extEl.style.display="block";}
  else{extEl.style.display="none";}
  var synsEl=document.getElementById("syns");
  synsEl.innerHTML="";
  if(q.s){q.s.forEach(function(s){
    var span=document.createElement("span");
    span.className="syn";span.textContent=s;
    synsEl.appendChild(span);
  });}
  document.getElementById("ans").style.display="none";
  document.getElementById("hint").style.display="flex";
  document.getElementById("ba").style.display="none";
  document.getElementById("card").className="card";
  document.getElementById("ctr").textContent=(idx+1)+"/"+deck.length;
  var pct=Math.round(idx/deck.length*100);
  document.getElementById("pb").style.width=pct+"%";
  document.getElementById("pl").textContent=idx+" done";
  document.getElementById("pr").textContent=deck.length+" cards";
}

function reveal(){
  if(rev)return;rev=true;
  document.getElementById("ans").style.display="block";
  document.getElementById("hint").style.display="none";
  document.getElementById("ba").style.display="flex";
  document.getElementById("card").className="card done";
}

function rate(r){
  var q=deck[idx];
  if(r==="p") cp++;
  else if(r==="h"){ch++;toRev.push(q);}
  else{cbv++;toRev.push(q);}
  upStats();idx++;
  if(idx>=deck.length){showResult();return;}
  showCard();
}

function upStats(){
  document.getElementById("sp").textContent=cp;
  document.getElementById("sh").textContent=ch;
  document.getElementById("sb").textContent=cbv;
}

function showResult(){
  document.getElementById("pb").style.width="100%";
  hide("qv");
  if(toRev.length===0){show("fv");return;}
  show("rv");
  document.getElementById("rp").textContent=cp;
  document.getElementById("rh").textContent=ch;
  document.getElementById("rbb").textContent=cbv;
  var pct=Math.round(cp/deck.length*100);
  document.getElementById("ri").textContent=pct>=90?"&#127775;":pct>=70?"&#128522;":pct>=50?"&#128170;":"&#128548;";
  document.getElementById("rt").textContent="Round "+ronde+" complete!";
  document.getElementById("rs").textContent=
    pct>=90?"Almost perfect! "+toRev.length+" cards left.":
    pct>=70?"Great job! "+toRev.length+" cards to review.":
    pct>=50?"Good effort! Review "+toRev.length+" cards.":
    "Keep going! "+toRev.length+" cards waiting.";
  document.getElementById("nb").textContent="Round "+(ronde+1)+" → "+toRev.length+" cards";
  var rl=document.getElementById("rl");
  rl.innerHTML="";
  toRev.forEach(function(v){
    var d=document.createElement("div");d.className="ri";
    d.innerHTML="<span class='ri-word'>"+v.w+"</span><div><div class='ri-pos'>"+v.pos+"</div></div><span class='ri-id'>"+v.m+"</span>";
    rl.appendChild(d);
  });
  document.getElementById("rlw").style.display="";
}

function show(id){document.getElementById(id).style.display="";}
function hide(id){document.getElementById(id).style.display="none";}

setCat("ALL");
</script>
